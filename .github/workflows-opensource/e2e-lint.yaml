name: E2E Lint

on:
  pull_request:
    paths:
      - "e2e/**"
  push:
    branches: [main]
    paths:
      - "e2e/**"

jobs:
  lint:
    name: ESLint + Prettier + TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - run: npm ci
      - run: npm run ci:lint
