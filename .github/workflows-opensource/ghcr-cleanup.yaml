name: Weekly GHCR Image Purge

on:
  schedule:
    - cron: '0 2 * * 0'  # 2am UTC every Sunday
  workflow_dispatch:      # Allow manual trigger for testing
    inputs:
      dry_run:
        description: 'Dry run (log what would be deleted without deleting)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      retention_days:
        description: 'Delete images older than this many days'
        required: false
        default: '7'
        type: string

permissions:
  packages: write

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  purge:
    name: Purge old PR images
    runs-on: ubuntu-latest
    steps:
      - name: Purge old tagged and untagged PR images
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const DRY_RUN = (context.eventName === 'workflow_dispatch'
              ? '${{ inputs.dry_run }}'
              : 'false') === 'true';
            const RETENTION_DAYS = parseInt(
              context.eventName === 'workflow_dispatch'
                ? '${{ inputs.retention_days }}'
                : '7',
              10
            );

            const owner = context.repo.owner;
            const packages = [
              'videocall-media-server',
              'videocall-meeting-api',
              'videocall-web-ui',
            ];

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - RETENTION_DAYS);

            console.log(`Purge mode: ${DRY_RUN ? 'DRY RUN' : 'LIVE'}`);
            console.log(`Retention: ${RETENTION_DAYS} days (cutoff: ${cutoff.toISOString()})`);
            console.log(`Owner: ${owner}`);

            // Detect org vs user once
            const { data: ownerInfo } = await github.rest.users.getByUsername({ username: owner });
            const isOrg = ownerInfo.type === 'Organization';
            console.log(`Owner type: ${ownerInfo.type}`);

            let totalDeleted = 0;
            let totalKept = 0;

            for (const packageName of packages) {
              console.log(`\n── Package: ${packageName} ──`);

              // Paginate through all versions
              let allVersions = [];
              let page = 1;
              while (true) {
                const resp = isOrg
                  ? await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                      package_type: 'container',
                      package_name: packageName,
                      org: owner,
                      per_page: 100,
                      page,
                    })
                  : await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                      package_type: 'container',
                      package_name: packageName,
                      username: owner,
                      per_page: 100,
                      page,
                    });
                if (resp.data.length === 0) break;
                allVersions = allVersions.concat(resp.data);
                if (resp.data.length < 100) break;
                page++;
              }

              console.log(`  Found ${allVersions.length} total version(s)`);

              for (const version of allVersions) {
                const updatedAt = new Date(version.updated_at);
                const tags = version.metadata?.container?.tags ?? [];
                const isPrTagged = tags.some(t => /^pr-\d+$/.test(t));
                const isUntagged = tags.length === 0;

                // Only touch pr-* tagged versions and untagged (ghost) versions
                if (!isPrTagged && !isUntagged) {
                  totalKept++;
                  continue;
                }

                if (updatedAt >= cutoff) {
                  console.log(`  KEEP  id=${version.id} tags=[${tags.join(',')||'<untagged>'}] updated=${updatedAt.toISOString()}`);
                  totalKept++;
                  continue;
                }

                console.log(`  ${DRY_RUN ? 'WOULD DELETE' : 'DELETE'} id=${version.id} tags=[${tags.join(',')||'<untagged>'}] updated=${updatedAt.toISOString()}`);

                if (!DRY_RUN) {
                  try {
                    if (isOrg) {
                      await github.rest.packages.deletePackageVersionForOrg({
                        package_type: 'container',
                        package_name: packageName,
                        org: owner,
                        package_version_id: version.id,
                      });
                    } else {
                      await github.rest.packages.deletePackageVersionForUser({
                        package_type: 'container',
                        package_name: packageName,
                        username: owner,
                        package_version_id: version.id,
                      });
                    }
                    totalDeleted++;
                  } catch (err) {
                    console.log(`  ⚠️  Failed to delete id=${version.id}: ${err.message}`);
                  }
                } else {
                  totalDeleted++;
                }
              }
            }

            console.log(`\n── Summary ──`);
            console.log(`${DRY_RUN ? 'Would delete' : 'Deleted'}: ${totalDeleted} version(s)`);
            console.log(`Kept: ${totalKept} version(s)`);
