name: Daily Build Images

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at midnight US Eastern (5am UTC)
  workflow_dispatch:      # Allow manual trigger

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  build:
    name: Build and push daily images
    runs-on: [self-hosted, linux, docker]
    outputs:
      image_tag: ${{ steps.generate-tag.outputs.tag }}
    steps:
      - name: Setup PATH
        run: echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Generate timestamp tag (Eastern Time)
        id: generate-tag
        run: |
          TAG="daily-$(TZ=America/New_York date +%Y-%m-%d-%H%M)"
          echo "Generated tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/build-daily
          mkdir -p /tmp/build-daily
          cd /tmp/build-daily
          git clone https://oauth2:${GH_TOKEN}@github01.hclpnp.com/labs-projects/videocall.git .
          git checkout ${{ github.sha }}

      - name: Login to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          echo "$HARBOR_PASSWORD" | docker login hclcr.io -u "$HARBOR_USERNAME" --password-stdin
          echo "✅ Harbor login successful"

      - name: Build and push all images (parallel)
        env:
          REGISTRY: ${{ vars.DOCKER_REGISTRY }}
        run: |
          cd /tmp/build-daily
          TAG=${{ steps.generate-tag.outputs.tag }}

          echo "🚀 Starting parallel builds for daily images..."
          echo "   Tag: $TAG"
          echo "   - Media Server (WebSocket/WebTransport)"
          echo "   - Meeting API (REST backend)"
          echo "   - Dioxus UI (WASM frontend)"
          echo ""

          # Clean up old log directories (older than 24 hours)
          echo "🧹 Cleaning up old build logs (>24 hours old)..."
          find /tmp -maxdepth 1 -name "build-logs-daily-*" -type d -mmin +1440 -exec rm -rf {} \; 2>/dev/null || {
            echo "⚠️  Warning: Could not clean some old log directories (non-fatal)"
          }

          # Create timestamped log directory
          TIMESTAMP=$(date +%s)
          LOG_DIR="/tmp/build-logs-daily-${TIMESTAMP}"
          mkdir -p ${LOG_DIR}
          echo "📁 Build logs directory: ${LOG_DIR}"
          echo ""

          # Start all builds in background with separate log files
          ./cut_build_push_backend.sh ${TAG} > ${LOG_DIR}/media-server.log 2>&1 &
          PID_MEDIA=$!

          ./cut_build_push_meeting_api.sh ${TAG} > ${LOG_DIR}/meeting-api.log 2>&1 &
          PID_API=$!

          ./cut_build_push_ui.sh ${TAG} > ${LOG_DIR}/ui.log 2>&1 &
          PID_UI=$!

          echo "Started background builds:"
          echo "  - Media Server: PID $PID_MEDIA"
          echo "  - Meeting API:  PID $PID_API"
          echo "  - UI (Dioxus):  PID $PID_UI"
          echo ""

          # Wait for all builds to complete
          FAILED=0

          echo "⏳ Waiting for media server build..."
          if wait $PID_MEDIA; then
            echo "✅ Media server build completed"
            tail -5 ${LOG_DIR}/media-server.log
          else
            echo "❌ Media server build FAILED (exit code: $?)"
            echo "=== Last 20 lines of media server log ==="
            tail -20 ${LOG_DIR}/media-server.log
            FAILED=1
          fi
          echo ""

          echo "⏳ Waiting for meeting API build..."
          if wait $PID_API; then
            echo "✅ Meeting API build completed"
            tail -5 ${LOG_DIR}/meeting-api.log
          else
            echo "❌ Meeting API build FAILED (exit code: $?)"
            echo "=== Last 20 lines of meeting API log ==="
            tail -20 ${LOG_DIR}/meeting-api.log
            FAILED=1
          fi
          echo ""

          echo "⏳ Waiting for UI build..."
          if wait $PID_UI; then
            echo "✅ UI build completed"
            tail -5 ${LOG_DIR}/ui.log
          else
            echo "❌ UI build FAILED (exit code: $?)"
            echo "=== Last 20 lines of UI log ==="
            tail -20 ${LOG_DIR}/ui.log
            FAILED=1
          fi
          echo ""

          # Report status and keep logs for 24 hours
          if [ $FAILED -eq 1 ]; then
            echo "❌ One or more builds failed"
            echo "⚠️  Full build logs retained at: ${LOG_DIR}"
            echo "   Logs will be automatically cleaned after 24 hours"
            echo ""
            echo "To view full logs, SSH to runner and:"
            echo "   cat ${LOG_DIR}/media-server.log"
            echo "   cat ${LOG_DIR}/meeting-api.log"
            echo "   cat ${LOG_DIR}/ui.log"
            exit 1
          else
            echo "✅ All builds completed successfully!"
            echo "📁 Build logs retained at: ${LOG_DIR}"
            echo "   Logs will be automatically cleaned after 24 hours"
          fi

      - name: Save image tag for deploy workflow
        if: success()
        run: |
          TAG=${{ steps.generate-tag.outputs.tag }}
          echo "$TAG" > /tmp/image-tag.txt
          echo "Saved tag for deployment: $TAG"

      - name: Upload image tag artifact
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: image-tag
          path: /tmp/image-tag.txt
          retention-days: 1

      - name: Display built images
        if: success()
        run: |
          TAG=${{ steps.generate-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          echo "✅ Daily build completed successfully!"
          echo ""
          echo "Built images:"
          echo "  - ${REGISTRY}/videocall-media-server:${TAG}"
          echo "  - ${REGISTRY}/videocall-meeting-api:${TAG}"
          echo "  - ${REGISTRY}/videocall-dioxus-ui:${TAG}"
          echo ""
          echo "Images pushed to Harbor registry: hclcr.io"
          echo ""
          echo "To deploy these images, the daily deploy workflow will be automatically triggered."

      - name: Cleanup build directory
        if: always()
        run: rm -rf /tmp/build-daily
