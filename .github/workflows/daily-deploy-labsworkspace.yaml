name: Daily Deploy to labsworkspace

# Triggered as a workflow_dispatch by the "Daily Build Images (HCL)" workflow,
# which passes the tag it just built. Can also be run manually: provide an
# image_tag to deploy a specific build, or leave it blank to auto-deploy the
# latest daily-* tag found in Harbor.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., daily-2026-03-10-0000). Leave blank to deploy the latest tag in Harbor.'
        required: false
        type: string
      deploy_ref:
        description: 'Commit SHA to check out for Helm charts. The build passes the SHA its images were built from so charts match the image. Leave blank to use the latest hcl-main.'
        required: false
        type: string

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  NAMESPACE: videocall

jobs:
  deploy:
    name: Deploy to labsworkspace
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Setup PATH
        run: echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.LABSWORKSPACE_KUBECONFIG }}" | base64 -d > ~/.kube/labsworkspace.yaml
          chmod 600 ~/.kube/labsworkspace.yaml
          echo "KUBECONFIG=$HOME/.kube/labsworkspace.yaml" >> $GITHUB_ENV

      - name: Validate kubectl and kubeconfig access
        run: |
          test -f "${KUBECONFIG}"
          test -r "${KUBECONFIG}"
          kubectl config current-context
          CLUSTER_INFO=$(kubectl cluster-info)
          echo "${CLUSTER_INFO}"
          # Strip ANSI color codes before grep.
          # The labsworkspace kubeconfig advertises the control plane by node IP
          # (10.190.75.36), which is what k3s exposes; the DNS name
          # k3s.labsworkspace.fnxlabs.com resolves to that same IP. Accept either
          # form so the guard still confirms the right cluster regardless of how the
          # kubeconfig server endpoint is written.
          echo "${CLUSTER_INFO}" | sed 's/\x1b\[[0-9;]*m//g' | grep -E "Kubernetes control plane is running at https://(k3s\.labsworkspace\.fnxlabs\.com|10\.190\.75\.36):6443"

      - name: Determine image tag
        id: determine-tag
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -n "$TAG" ]; then
            echo "Using specified tag: $TAG"
          else
            # No tag given: deploy the most recently pushed daily-* image in
            # Harbor. Query the media-server repo's artifacts sorted by push
            # time (newest first) and take the first daily-YYYY-MM-DD-HHMM tag.
            # page_size is a window (not 1) because PR builds push pr-<N> tags
            # to this same repo; scanning the newest 100 artifacts finds the
            # latest daily tag even if PR images were pushed since — sufficient
            # given the daily build cadence vs. PR push volume.
            # Uses only curl + grep (no gh/jq) to match the existing
            # "Verify Harbor images exist" step's proven toolset.
            echo "No tag specified — resolving latest daily-* tag from Harbor..."
            HARBOR_API="https://hclcr.io/api/v2.0"
            PROJECT="hcllabs"
            REPO="videocall-media-server"
            API_URL="${HARBOR_API}/projects/${PROJECT}/repositories/${REPO}/artifacts?sort=-push_time&page_size=100&with_tag=true"

            ARTIFACTS=$(curl -s -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" "${API_URL}")
            # `|| true`: grep exits 1 on no match, which under `set -euo pipefail`
            # would abort the step before the empty-TAG guard below could report
            # the failure (and the API response) usefully.
            TAG=$(printf '%s' "$ARTIFACTS" | grep -oE 'daily-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}' | head -n1 || true)

            if [ -z "$TAG" ]; then
              echo "::error::Could not determine latest tag from Harbor (repo ${REPO}). API response:"
              echo "$ARTIFACTS"
              exit 1
            fi
            echo "Using latest tag from Harbor: $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying images with tag: $TAG"

      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          # Pin the Helm charts to the commit the images were built from (passed
          # by the build via deploy_ref) so charts can't drift ahead of the
          # image if hcl-main advances during the build. Blank on manual runs →
          # checkout defaults to the triggering ref (hcl-main HEAD).
          ref: ${{ inputs.deploy_ref }}
          # Full history: deploy_ref is often a non-tip commit (hcl-main moved
          # on during the build), and a depth-1 fetch of an arbitrary SHA only
          # works if the server allows reachable-SHA-in-want. fetch-depth: 0
          # fetches all refs so the build SHA is always reachable.
          fetch-depth: 0

      - name: Add NATS Helm repo
        run: |
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update

      - name: Login to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          echo "Attempting Harbor login as user: $HARBOR_USERNAME"
          if echo "$HARBOR_PASSWORD" | docker login hclcr.io -u "$HARBOR_USERNAME" --password-stdin; then
            echo "✅ Harbor login successful"
          else
            echo "❌ Harbor login failed"
            exit 1
          fi

      - name: Verify Harbor images exist
        id: verify-images
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          echo "Checking if Harbor images exist for tag: ${TAG}..."
          echo "Registry: ${REGISTRY}"

          # Harbor API endpoint
          HARBOR_API="https://hclcr.io/api/v2.0"
          PROJECT="hcllabs"

          REPOS=(
            "videocall-media-server"
            "videocall-meeting-api"
            "videocall-dioxus-ui"
          )

          MISSING_IMAGES=()

          for REPO in "${REPOS[@]}"; do
            IMAGE="${REGISTRY}/${REPO}:${TAG}"
            echo "Checking ${IMAGE}..."

            # Use Harbor API to check if artifact exists
            ENCODED_REPO=$(echo "${REPO}" | sed 's/\//%2F/g')
            API_URL="${HARBOR_API}/projects/${PROJECT}/repositories/${ENCODED_REPO}/artifacts/${TAG}"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" "${API_URL}")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ Found"
            else
              echo "  ❌ Not found (HTTP ${HTTP_CODE})"
              MISSING_IMAGES+=("${IMAGE}")
            fi
          done

          if [ ${#MISSING_IMAGES[@]} -gt 0 ]; then
            echo "❌ Missing images:"
            for IMG in "${MISSING_IMAGES[@]}"; do
              echo "  - ${IMG}"
            done
            echo "::error::Cannot deploy - required images not found in Harbor"
            exit 1
          else
            echo "✅ All images found in Harbor"
          fi

      - name: Create videocall namespace (if not exists)
        run: |
          echo "Ensuring videocall namespace exists..."
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${NAMESPACE} app=videocall env=labsworkspace --overwrite
          echo "✅ Namespace ready: ${NAMESPACE}"

      - name: Verify required secrets exist
        run: |
          echo "Checking for required secrets in ${NAMESPACE} namespace..."

          REQUIRED_SECRETS=(
            "postgres-credentials"
            "jwt-secret"
            "harbor-pull-secret"
          )

          MISSING_SECRETS=()

          for SECRET in "${REQUIRED_SECRETS[@]}"; do
            if kubectl get secret ${SECRET} -n ${NAMESPACE} >/dev/null 2>&1; then
              echo "  ✅ ${SECRET}"
            else
              echo "  ❌ ${SECRET}"
              MISSING_SECRETS+=("${SECRET}")
            fi
          done

          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "::error::Missing required secrets in ${NAMESPACE} namespace:"
            for SECRET in "${MISSING_SECRETS[@]}"; do
              echo "  - ${SECRET}"
            done
            exit 1
          fi

          echo "✅ All required secrets exist"

      - name: Check NATS deployment
        id: check-nats
        run: |
          if kubectl get deployment -n ${NAMESPACE} -l app.kubernetes.io/name=nats >/dev/null 2>&1; then
            echo "✅ NATS already deployed in ${NAMESPACE}"
            echo "nats_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  NATS not found, will deploy"
            echo "nats_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy NATS (if not exists)
        if: steps.check-nats.outputs.nats_exists == 'false'
        run: |
          echo "Deploying NATS to ${NAMESPACE} namespace..."

          # Build helm dependencies for the NATS chart
          helm dependency update helm/global/us-east/nats/

          # Deploy using the production NATS chart
          helm upgrade --install nats helm/global/us-east/nats/ \
            --namespace ${NAMESPACE} \
            --set nats.natsbox.enabled=true \
            --set nats.reloader.enabled=true \
            --set nats.exporter.enabled=true \
            --set nats.nats.resources.limits.cpu=200m \
            --set nats.nats.resources.limits.memory=256Mi \
            --set nats.nats.resources.requests.cpu=100m \
            --set nats.nats.resources.requests.memory=128Mi \
            --set gateway.enabled=false \
            --wait --timeout 5m

          echo "✅ NATS deployed to ${NAMESPACE}"

      - name: Deploy WebTransport Server
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          echo "Deploying WebTransport server to ${NAMESPACE}..."

          # NOTE: The helm/rustlemania-webtransport chart does not render an Ingress or Certificate resource,
          # so the cert-manager annotation below has no effect. The webtransport-tls secret must be pre-created
          # via a Certificate CR or manual provisioning. Both labsworkspace and Ascend clusters have this
          # secret already provisioned.
          #
          # NOTE: TOKIO_WORKER_THREADS is deliberately NOT set here (issue #1639,
          # option c). webtransport_server is `#[actix_rt::main]` (single-threaded
          # current-thread runtime) and never reads it; the WtChatSession actor
          # requires the LocalSet/spawn_local, so tuning thread count cannot
          # relieve back-pressure. The env array below is contiguous (env[0..7]).

          helm upgrade --install videocall-webtransport helm/rustlemania-webtransport/ \
            --namespace ${NAMESPACE} \
            --set image.repository=${REGISTRY}/videocall-media-server \
            --set image.tag=${TAG} \
            --set imagePullSecrets[0].name=harbor-pull-secret \
            --set fullnameOverride=videocall-webtransport \
            --set service.type=LoadBalancer \
            --set service.port=4433 \
            --set service.healthPort=444 \
            --set "command[0]=webtransport_server" \
            --set tlsSecret=webtransport-tls \
            --set certificateDomain=webtransport.videocall.labsworkspace.fnxlabs.com \
            --set "env[0].name=JWT_SECRET" \
            --set "env[0].valueFrom.secretKeyRef.name=jwt-secret" \
            --set "env[0].valueFrom.secretKeyRef.key=secret" \
            --set "env[1].name=RUST_LOG" \
            --set "env[1].value=warn" \
            --set "env[2].name=NATS_URL" \
            --set "env[2].value=nats:4222" \
            --set "env[3].name=LISTEN_URL" \
            --set "env[3].value=0.0.0.0:4433" \
            --set "env[4].name=HEALTH_LISTEN_URL" \
            --set "env[4].value=0.0.0.0:444" \
            --set "env[5].name=CERT_PATH" \
            --set "env[5].value=/certs/tls.crt" \
            --set "env[6].name=KEY_PATH" \
            --set "env[6].value=/certs/tls.key" \
            --set "env[7].name=TOKIO_BLOCKING_THREADS" \
            --set-string "env[7].value=2" \
            --set ingress.enabled=false \
            --wait --timeout 5m

          echo "✅ WebTransport server deployed (LoadBalancer)"

      - name: Deploy WebSocket Server
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          echo "Deploying WebSocket server to ${NAMESPACE}..."

          helm upgrade --install videocall-websocket helm/rustlemania-websocket/ \
            --namespace ${NAMESPACE} \
            --set image.repository=${REGISTRY}/videocall-media-server \
            --set image.tag=${TAG} \
            --set imagePullSecrets[0].name=harbor-pull-secret \
            --set fullnameOverride=videocall-websocket \
            --set "env[0].name=NATS_URL" \
            --set "env[0].value=nats://nats.${NAMESPACE}.svc.cluster.local:4222" \
            --set "env[1].name=JWT_SECRET" \
            --set "env[1].valueFrom.secretKeyRef.name=jwt-secret" \
            --set "env[1].valueFrom.secretKeyRef.key=secret" \
            --set "env[2].name=ACTIX_PORT" \
            --set-string "env[2].value=8080" \
            --set "env[3].name=RUST_LOG" \
            --set "env[3].value=info" \
            --set "env[4].name=REGION" \
            --set "env[4].value=us-east-1" \
            --set "env[5].name=SERVICE_TYPE" \
            --set "env[5].value=websocket" \
            --set "env[6].name=SERVER_STATS_INTERVAL_SECS" \
            --set-string "env[6].value=5" \
            --set ingress.enabled=true \
            --set "ingress.hosts[0].host=websocket.videocall.labsworkspace.fnxlabs.com" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.hosts[0].paths[0].service.name=videocall-websocket" \
            --set "ingress.hosts[0].paths[0].service.port.number=8080" \
            --set "ingress.tls[0].secretName=websocket-tls" \
            --set "ingress.tls[0].hosts[0]=websocket.videocall.labsworkspace.fnxlabs.com" \
            --set-string "ingress.annotations.nginx\.ingress\.kubernetes\.io/proxy-read-timeout=3600" \
            --set-string "ingress.annotations.nginx\.ingress\.kubernetes\.io/proxy-send-timeout=3600" \
            --set "ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-prod" \
            --wait --timeout 5m

          echo "✅ WebSocket server deployed"

      - name: Deploy Metrics API
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          echo "Deploying Metrics API to ${NAMESPACE}..."

          helm upgrade --install metrics-api helm/metrics-api/ \
            --namespace ${NAMESPACE} \
            --set metricsApi.image.repository=${REGISTRY}/videocall-media-server \
            --set metricsApi.image.tag=${TAG} \
            --set metricsApi.imagePullSecrets[0].name=harbor-pull-secret \
            --set serverStats.image.repository=${REGISTRY}/videocall-media-server \
            --set serverStats.image.tag=${TAG} \
            --set serverStats.imagePullSecrets[0].name=harbor-pull-secret \
            --wait --timeout 5m

          echo "✅ Metrics API deployed"

      - name: Deploy Meeting API
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          # Get postgres password
          PG_PASSWORD=$(kubectl get secret postgres-credentials -n ${NAMESPACE} -o jsonpath='{.data.password}' | base64 -d)

          echo "Deploying Meeting API to ${NAMESPACE} with PKCE OAuth enabled..."
          # NOTE: OAUTH_SECRET env var is intentionally empty for PKCE flow (public client, no static secret)

          helm upgrade --install videocall-api helm/meeting-api/ \
            --namespace ${NAMESPACE} \
            --set image.repository=${REGISTRY}/videocall-meeting-api \
            --set image.tag=${TAG} \
            --set imagePullSecrets[0].name=harbor-pull-secret \
            --set fullnameOverride=videocall-api \
            --set "env[0].name=DATABASE_URL" \
            --set "env[0].value=postgres://postgres:${PG_PASSWORD}@postgres-postgresql.${NAMESPACE}.svc.cluster.local:5432/videocall?sslmode=disable" \
            --set "env[1].name=JWT_SECRET" \
            --set "env[1].valueFrom.secretKeyRef.name=jwt-secret" \
            --set "env[1].valueFrom.secretKeyRef.key=secret" \
            --set "env[2].name=CORS_ALLOWED_ORIGIN" \
            --set "env[2].value=https://app.videocall.labsworkspace.fnxlabs.com\,https://app.labsworkspace.fnxlabs.com" \
            --set "env[3].name=COOKIE_DOMAIN" \
            --set "env[3].value=.labsworkspace.fnxlabs.com" \
            --set "env[4].name=OAUTH_ISSUER" \
            --set "env[4].value=https://id.labsworkspace.fnxlabs.com" \
            --set "env[5].name=OAUTH_CLIENT_ID" \
            --set "env[5].value=client_01KVR3TZ42FAAM76MMKZ81A0TA" \
            --set "env[6].name=OAUTH_SECRET" \
            --set "env[6].value=" \
            --set "env[7].name=OAUTH_REDIRECT_URL" \
            --set "env[7].value=https://app.videocall.labsworkspace.fnxlabs.com/auth/callback" \
            --set "env[8].name=AFTER_LOGIN_URL" \
            --set "env[8].value=https://app.videocall.labsworkspace.fnxlabs.com" \
            --set "env[9].name=OAUTH_SCOPES" \
            --set "env[9].value=openid email profile" \
            --set "env[10].name=ALLOWED_REDIRECT_URLS" \
            --set "env[10].value=https://app.videocall.labsworkspace.fnxlabs.com" \
            --set "env[11].name=LISTEN_ADDR" \
            --set "env[11].value=0.0.0.0:8081" \
            --set "env[12].name=RUST_LOG" \
            --set "env[12].value=info" \
            --set "env[13].name=COOKIE_NAME" \
            --set "env[13].value=videocall-session" \
            --set "env[14].name=COOKIE_SECURE" \
            --set-string "env[14].value=true" \
            --set "env[15].name=SERVICE_VERSION_URLS" \
            --set "env[15].value=http://videocall-websocket:8080/version\,http://videocall-webtransport-lb:444/version\,http://videocall-dioxus-ui:80/version.json" \
            --set "env[16].name=TOKEN_TTL_SECS" \
            --set-string "env[16].value=86400" \
            --set "env[17].name=NATS_URL" \
            --set "env[17].value=nats://nats.${NAMESPACE}.svc.cluster.local:4222" \
            --set "env[18].name=OAUTH_BROWSER_PKCE" \
            --set-string "env[18].value=true" \
            --set "env[19].name=AFTER_LOGOUT_URL" \
            --set "env[19].value=https://app.videocall.labsworkspace.fnxlabs.com/" \
            --set ingress.enabled=true \
            --set "ingress.hosts[0].host=api.videocall.labsworkspace.fnxlabs.com" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.hosts[0].paths[0].service.name=videocall-api" \
            --set "ingress.hosts[0].paths[0].service.port.number=8081" \
            --set "ingress.tls[0].secretName=api-tls" \
            --set "ingress.tls[0].hosts[0]=api.videocall.labsworkspace.fnxlabs.com" \
            --set "ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-prod" \
            --set consoleLogs.enabled=true \
            --set consoleLogs.storageSize=5Gi \
            --set-string consoleLogs.retentionDays=14 \
            --wait --timeout 5m

          echo "✅ Meeting API deployed with PKCE OAuth and console log collection"

      - name: Deploy Dioxus UI
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          REGISTRY_VAR="${{ vars.DOCKER_REGISTRY }}"
          REGISTRY="${REGISTRY_VAR:-hclcr.io/hcllabs}"

          echo "Deploying Dioxus UI to ${NAMESPACE}..."

          helm upgrade --install videocall-dioxus-ui helm/videocall-ui/ \
            --namespace ${NAMESPACE} \
            --set image.repository=${REGISTRY}/videocall-dioxus-ui \
            --set image.tag=${TAG} \
            --set "imagePullSecrets[0].name=harbor-pull-secret" \
            --set fullnameOverride=videocall-dioxus-ui \
            --set "runtimeConfig.apiBaseUrl=https://api.videocall.labsworkspace.fnxlabs.com" \
            --set "runtimeConfig.meetingApiBaseUrl=https://api.videocall.labsworkspace.fnxlabs.com" \
            --set "runtimeConfig.jmapBaseUrl=https://smatter.labsworkspace.fnxlabs.com" \
            --set "runtimeConfig.wsUrl=wss://websocket.videocall.labsworkspace.fnxlabs.com" \
            --set "runtimeConfig.webTransportHost=https://webtransport.videocall.labsworkspace.fnxlabs.com:4433" \
            --set-string "runtimeConfig.webTransportEnabled=true" \
            --set-string "runtimeConfig.transportBadgeEnabled=true" \
            --set-string "runtimeConfig.showBuildGitInfo=false" \
            --set-string "runtimeConfig.oauthEnabled=true" \
            --set "runtimeConfig.oauthIssuer=https://id.labsworkspace.fnxlabs.com" \
            --set "runtimeConfig.oauthFlow=pkce" \
            --set "runtimeConfig.oauthClientId=client_01KVR3TZ42FAAM76MMKZ81A0TA" \
            --set-string "runtimeConfig.e2eeEnabled=false" \
            --set-string "runtimeConfig.firefoxEnabled=false" \
            --set-string "runtimeConfig.hardwareMetricsEnabled=true" \
            --set "runtimeConfig.usersAllowedToStream=" \
            --set "runtimeConfig.serverElectionPeriodMs=2000" \
            --set "runtimeConfig.audioBitrateKbps=65" \
            --set "runtimeConfig.videoBitrateKbps=1000" \
            --set "runtimeConfig.screenBitrateKbps=1000" \
            --set-string "runtimeConfig.consoleLogUploadEnabled=true" \
            --set ingress.enabled=true \
            --set "ingress.hosts[0].host=app.videocall.labsworkspace.fnxlabs.com" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.tls[0].secretName=dioxus-ui-tls" \
            --set "ingress.tls[0].hosts[0]=app.videocall.labsworkspace.fnxlabs.com" \
            --set "ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-prod" \
            --wait --timeout 5m

          echo "✅ Dioxus UI deployed"

      - name: Verify rollout status
        run: |
          echo "Verifying rollout status for all deployments..."

          kubectl rollout status deployment/videocall-webtransport -n ${NAMESPACE} --timeout=180s
          kubectl rollout status deployment/videocall-websocket -n ${NAMESPACE} --timeout=180s
          kubectl rollout status deployment/client-metrics-api -n ${NAMESPACE} --timeout=180s
          kubectl rollout status deployment/server-metrics-api -n ${NAMESPACE} --timeout=180s
          kubectl rollout status deployment/videocall-api -n ${NAMESPACE} --timeout=180s
          kubectl rollout status deployment/videocall-dioxus-ui -n ${NAMESPACE} --timeout=180s

          echo "✅ All deployments rolled out successfully"

      - name: Display deployment status
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}

          echo "=================================================="
          echo "✅ labsworkspace deployment completed successfully!"
          echo "=================================================="
          echo ""
          echo "Deployed image tag: ${TAG}"
          echo ""
          echo "labsworkspace URLs:"
          echo "  - Dioxus UI:     https://app.videocall.labsworkspace.fnxlabs.com"
          echo "  - API:           https://api.videocall.labsworkspace.fnxlabs.com"
          echo "  - WebSocket:     wss://websocket.videocall.labsworkspace.fnxlabs.com"
          echo "  - WebTransport:  https://webtransport.videocall.labsworkspace.fnxlabs.com"
          echo ""
          echo "Namespace: ${NAMESPACE}"
          echo ""
          echo "Deployment details:"
          kubectl get deployments -n ${NAMESPACE}
          echo ""
          echo "Pod status:"
          kubectl get pods -n ${NAMESPACE}
          echo ""
          echo "Service status:"
          kubectl get services -n ${NAMESPACE}
          echo ""
          echo "Ingress status:"
          kubectl get ingress -n ${NAMESPACE}
          echo ""
          echo "=================================================="

      - name: Notify Google Chat
        if: always()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          if [ -z "${GCHAT_WEBHOOK_URL}" ]; then
            echo "GCHAT_WEBHOOK_URL secret not set, skipping notification"
            exit 0
          fi

          TAG=${{ steps.determine-tag.outputs.tag }}
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=$(echo ${COMMIT_SHA} | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ *labsworkspace Deployment Complete*\n\n📦 Tag: \`${TAG}\`\n🌐 URL: https://app.videocall.labsworkspace.fnxlabs.com\n🌿 Branch: \`${BRANCH}\`\n📝 Commit: \`${SHORT_SHA}\`\n\n_Deployed to videocall namespace_"
          else
            MESSAGE="❌ *labsworkspace Deployment Failed*\n\n📦 Tag: \`${TAG}\`\n🌿 Branch: \`${BRANCH}\`\n📝 Commit: \`${SHORT_SHA}\`\n🔗 Logs: ${WORKFLOW_URL}\n\n_Check workflow logs for details_"
          fi

          curl -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${MESSAGE}\"}" || echo "Failed to send Google Chat notification (non-fatal)"

      - name: Post deployment summary
        if: always()
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}

          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::labsworkspace deployment successful - tag: ${TAG}"
          else
            echo "::error::labsworkspace deployment failed - tag: ${TAG}"
          fi

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f ~/.kube/labsworkspace.yaml
