name: E2E Tests (HCL)

on:
  push:
    branches: [hcl-main, PR-staging]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: true
        default: 'PR-staging'
      grep:
        description: 'Playwright --grep filter (optional, e.g. @smoke)'
        required: false

concurrency:
  group: e2e-hcl-${{ github.event_name == 'issue_comment' && github.event.issue.number || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 60
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == '/run-e2e')

    outputs:
      tests_passed: ${{ steps.results.outputs.passed }}
      tests_failed: ${{ steps.results.outputs.failed }}
      tests_skipped: ${{ steps.results.outputs.skipped }}
      duration: ${{ steps.results.outputs.duration }}
      status: ${{ steps.results.outputs.status }}
      branch: ${{ steps.setup.outputs.branch }}

    steps:
      - name: Acknowledge /run-e2e comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

      - name: Determine branch
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ inputs.branch }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            BRANCH=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '.head.ref')
          else
            BRANCH="${{ github.ref_name }}"
          fi
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Testing branch: ${BRANCH}"

      - name: Clean workspace (root-owned files from Docker)
        run: |
          sudo find . -mindepth 1 -delete 2>/dev/null || true
          sudo rm -rf /var/lib/ghrunner/_work/videocall/videocall/* 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.setup.outputs.branch }}
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies and Playwright browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium

      - name: Build E2E stack images
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml build

      - name: Start E2E stack
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml up -d

      - name: Wait for services to be healthy
        run: |
          wait_for_service() {
            local name="$1" url="$2" timeout="$3"
            echo "Waiting for ${name}..."
            for i in $(seq 1 "${timeout}"); do
              if curl -sf "${url}" > /dev/null 2>&1 || \
                 curl -so /dev/null -w '%{http_code}' "${url}" 2>/dev/null | grep -qE '2[0-9][0-9]|4[0-9][0-9]'; then
                echo "${name} ready after ${i}s"
                return 0
              fi
              sleep 1
            done
            echo "ERROR: ${name} failed to become ready within ${timeout}s"
            return 1
          }

          wait_for_service "dioxus-ui" "http://localhost:3001" 120
          wait_for_service "meeting-api" "http://localhost:8081/session" 60
          wait_for_service "websocket-api" "http://localhost:8080" 60

      - name: Run Playwright tests
        id: playwright
        working-directory: e2e
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
          E2E_GREP: ${{ inputs.grep }}
        run: |
          ARGS=(--reporter=list,json)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${E2E_GREP}" ]; then
            ARGS+=(--grep "${E2E_GREP}")
          fi

          START_TIME=$(date +%s)
          set +e
          npx playwright test "${ARGS[@]}"
          EXIT_CODE=$?
          set -e
          END_TIME=$(date +%s)

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "start_time=${START_TIME}" >> $GITHUB_OUTPUT
          echo "end_time=${END_TIME}" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: results
        working-directory: e2e
        run: |
          DURATION=$(( ${{ steps.playwright.outputs.end_time }} - ${{ steps.playwright.outputs.start_time }} ))

          if [ -f playwright-results.json ] && jq -e '.stats' playwright-results.json >/dev/null 2>&1; then
            PASSED=$(jq '.stats.expected // 0' playwright-results.json)
            FAILED=$(jq '(.stats.unexpected // 0) + (.stats.flaky // 0)' playwright-results.json)
            SKIPPED=$(jq '.stats.skipped // 0' playwright-results.json)
          else
            # Fallback: parse from exit code
            PASSED=0
            FAILED=0
            SKIPPED=0
            if [ "${{ steps.playwright.outputs.exit_code }}" = "0" ]; then
              PASSED=1
            else
              FAILED=1
            fi
          fi

          STATUS=0
          if [ "${{ steps.playwright.outputs.exit_code }}" = "0" ]; then
            STATUS=1
          fi

          echo "passed=${PASSED}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT
          echo "status=${STATUS}" >> $GITHUB_OUTPUT

          echo "Results: ${PASSED} passed, ${FAILED} failed, ${SKIPPED} skipped (${DURATION}s)"

      - name: Push metrics to Pushgateway
        if: always() && steps.results.outputs.status != ''
        run: |
          BRANCH="${{ steps.setup.outputs.branch }}"
          PASSED="${{ steps.results.outputs.passed }}"
          FAILED="${{ steps.results.outputs.failed }}"
          SKIPPED="${{ steps.results.outputs.skipped }}"
          DURATION="${{ steps.results.outputs.duration }}"
          STATUS="${{ steps.results.outputs.status }}"
          TIMESTAMP=$(date +%s)

          PUSHGATEWAY_URL="https://pushgateway.videocall.fnxlabs.com"

          METRICS_PAYLOAD="# HELP e2e_tests_passed Number of passing E2E tests
          # TYPE e2e_tests_passed gauge
          e2e_tests_passed ${PASSED}
          # HELP e2e_tests_failed Number of failing E2E tests
          # TYPE e2e_tests_failed gauge
          e2e_tests_failed ${FAILED}
          # HELP e2e_tests_skipped Number of skipped E2E tests
          # TYPE e2e_tests_skipped gauge
          e2e_tests_skipped ${SKIPPED}
          # HELP e2e_run_duration_seconds E2E suite wall-clock duration
          # TYPE e2e_run_duration_seconds gauge
          e2e_run_duration_seconds ${DURATION}
          # HELP e2e_run_status E2E run pass (1) or fail (0)
          # TYPE e2e_run_status gauge
          e2e_run_status ${STATUS}
          # HELP e2e_run_timestamp Unix timestamp of the E2E run
          # TYPE e2e_run_timestamp gauge
          e2e_run_timestamp ${TIMESTAMP}"

          echo "${METRICS_PAYLOAD}" | curl --fail-with-body --data-binary @- \
            "${PUSHGATEWAY_URL}/metrics/job/e2e/branch/${BRANCH}" || \
          echo "Pushgateway push failed (non-fatal, DNS may not be configured yet)"

          echo "Metrics pushed for branch=${BRANCH}"

      - name: Post results to PR comment
        if: always() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.setup.outputs.branch }}"
          PASSED="${{ steps.results.outputs.passed }}"
          FAILED="${{ steps.results.outputs.failed }}"
          SKIPPED="${{ steps.results.outputs.skipped }}"
          DURATION="${{ steps.results.outputs.duration }}"
          STATUS="${{ steps.results.outputs.status }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${STATUS}" = "1" ]; then
            EMOJI="✅"
            VERDICT="PASSED"
          else
            EMOJI="❌"
            VERDICT="FAILED"
          fi

          BODY="${EMOJI} **E2E ${VERDICT}** on \`${BRANCH}\`

          | Passed | Failed | Skipped | Duration |
          |--------|--------|---------|----------|
          | ${PASSED} | ${FAILED} | ${SKIPPED} | ${DURATION}s |

          [Workflow run](${RUN_URL})"

          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="${BODY}"

      - name: Notify Google Chat on failure
        if: always() && steps.results.outputs.status == '0' && github.event_name == 'push'
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          if [ -z "${GCHAT_WEBHOOK_URL}" ]; then
            echo "GCHAT_WEBHOOK_URL secret not set, skipping notification"
            exit 0
          fi

          BRANCH="${{ steps.setup.outputs.branch }}"
          PASSED="${{ steps.results.outputs.passed }}"
          FAILED="${{ steps.results.outputs.failed }}"
          SKIPPED="${{ steps.results.outputs.skipped }}"
          DURATION="${{ steps.results.outputs.duration }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          MESSAGE="❌ *E2E Tests FAILED* on \`${BRANCH}\`\n\n📊 Passed: ${PASSED} | Failed: ${FAILED} | Skipped: ${SKIPPED}\n⏱️ Duration: ${DURATION}s\n📝 Commit: \`${SHORT_SHA}\`\n🔗 ${RUN_URL}"

          curl -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${MESSAGE}\"}" || echo "Google Chat notification failed (non-fatal)"

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml logs

      - name: Teardown (preserve volumes for cache)
        if: always()
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml down

      - name: Fail job if tests failed
        if: steps.playwright.outputs.exit_code != '0'
        run: exit 1
