name: E2E Tests

on:
  pull_request:
    paths:
      - "e2e/**"
      - "yew-ui/**"
      - "actix-api/**"
      - "meeting-api/**"
      - "videocall-client/**"
      - "videocall-types/**"
      - "videocall-meeting-types/**"
      - "docker/docker-compose.e2e.yaml"
      - "docker/Dockerfile.actix.dev"
      - "docker/Dockerfile.yew.dev"
      - "flake.nix"
      - "flake.lock"
  push:
    branches: [main]
    paths:
      - "e2e/**"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright system deps
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E pipeline
        run: make e2e-ci

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml logs

      - name: Teardown (safety net)
        if: always()
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml down -v || true
