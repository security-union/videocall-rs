name: Build PR Images (HCL)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-build-images-${{ github.event.issue.number }}-hcl
  cancel-in-progress: false

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  check-permissions:
    name: Check permissions
    runs-on: [self-hosted, linux, docker]
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/build-images')
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      pr_number: ${{ steps.get-pr.outputs.pr_number }}
      pr_sha: ${{ steps.get-pr.outputs.pr_sha }}
      pr_ref: ${{ steps.get-pr.outputs.pr_ref }}
      pr_base_ref: ${{ steps.get-pr.outputs.pr_base_ref }}
    steps:
      - name: Setup PATH
        run: echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Get PR details
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('pr_number', context.issue.number);
            core.setOutput('pr_sha', pr.data.head.sha);
            core.setOutput('pr_ref', pr.data.head.ref);
            core.setOutput('pr_base_ref', pr.data.base.ref);
            return pr.data;

      - name: Check if user has write access
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const user = context.payload.comment.user.login;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: user
            });
            const permission = data.permission;
            console.log(`User ${user} has permission: ${permission}`);
            if (['admin', 'write'].includes(permission)) {
              console.log('✅ User is authorized');
              core.setOutput('authorized', 'true');
            } else {
              console.log('❌ User is not authorized');
              core.setOutput('authorized', 'false');
            }

      - name: React to comment (processing)
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Comment build started
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const user = context.payload.comment.user.login;
            const repo = context.repo.owner + '/' + context.repo.repo;
            const runId = context.runId;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔨 **Building Docker images for PR #${context.issue.number}**

            Started by @${user}

            **Building (in parallel):**
            - Media Server (WebSocket/WebTransport)
            - Meeting API (REST backend)
            - Dioxus UI (WASM frontend)

            ⏱️ Build typically takes 5-7 minutes. I'll post another comment when the build is complete.

            [View build logs](https://github01.hclpnp.com/${repo}/actions/runs/${runId})`
            });

      - name: Post error if unauthorized
        if: steps.check.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const user = context.payload.comment.user.login;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Permission denied**

            @${user}, you need **write** access to this repository to build images.

            Ask a repository admin to add you (or your team) with the **Write** role.`
            });
            core.setFailed('User not authorized');

  build:
    name: Build and push images
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    uses: ./.github/workflows/pr-build-images-reusable-hcl.yaml
    with:
      pr_number: ${{ needs.check-permissions.outputs.pr_number }}
      pr_sha: ${{ needs.check-permissions.outputs.pr_sha }}
      pr_base_ref: ${{ needs.check-permissions.outputs.pr_base_ref }}
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

  comment-success:
    name: Comment on build success
    needs: [check-permissions, build]
    if: needs.check-permissions.outputs.authorized == 'true' && needs.build.result == 'success'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Comment build success
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            const registry = '${{ vars.DOCKER_REGISTRY }}' || 'hclcr.io/hcllabs';
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Images built successfully!**

            **Images:**
            - \`${registry}/videocall-media-server:pr-${prNumber}\`
            - \`${registry}/videocall-meeting-api:pr-${prNumber}\`
            - \`${registry}/videocall-dioxus-ui:pr-${prNumber}\`

            Comment \`/deploy\` to create a preview environment.`
            });

      - name: React to comment (success)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'hooray'
            })

  comment-failure:
    name: Comment on build failure
    needs: [check-permissions, build]
    if: always() && needs.check-permissions.outputs.authorized == 'true' && needs.build.result == 'failure'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Comment build failure
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            const repo = context.repo.owner + '/' + context.repo.repo;
            const runId = context.runId;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Build failed**

            Check the [workflow logs](https://github01.hclpnp.com/${repo}/actions/runs/${runId}) for details.`
            });

      - name: React to comment (failure)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            })
