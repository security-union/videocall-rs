name: Backend Tests (HCL)

on:
  pull_request:
    branches: [hcl-main, PR-staging]
    paths:
      - 'actix-api/**'
      - 'meeting-api/**'
      - 'videocall-types/**'
      - 'videocall-meeting-types/**'
      - 'protobuf/**'
      - 'dbmate/**'
      - 'docker/docker-compose.integration.yaml'
      - 'docker/Dockerfile.actix.dev'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/pr-check-backend-hcl.yaml'

concurrency:
  group: pr-check-backend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  CARGO_HOME: /var/lib/ci/cargo
  RUSTUP_HOME: /var/lib/ci/rustup
  CARGO_INCREMENTAL: "0"
  PATH: /var/lib/ci/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  test:
    name: cargo tests
    runs-on: [self-hosted, linux, x64, hcl-ci]
    # 35, not 20 (#1247) — a BACKSTOP, not the fix. The real fixes are in this PR: the
    # ~3-min on-path `docker system prune` is now GATED (skipped unless disk < 50 GiB) and
    # cache-preserving (see the "Free disk space" step), and the daily ci-host-janitor owns
    # steady-state cleanup — so the common run no longer pays prune cost and builds stay warm.
    # 20 min was still producing FALSE reds on a GREEN suite though (verified on PR #1400's
    # red check, run 189279/videocallci-3: 0 failures, killed mid-run at the cap): the
    # remaining slowness is a cold CARGO compile (`hkdf` rebuilt 4x under CARGO_INCREMENTAL=0,
    # host-side target not cached), which is independent of docker. 35 gives that cold-compile
    # case headroom; warm runs finish well under it. Tunable back to ~20 once a cargo target
    # cache / sccache lands — tracked in #1247.
    timeout-minutes: 35
    concurrency:
      group: hcl-ci-backend
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          clean: false
          path: backend-repo

      # Isolate this runner's docker compose project from the other 3 runners
      # on the same host. Without this, parallel jobs share the same
      # `docker_default` network and `docker-postgres-1`/`docker-nats-1`
      # containers, which causes "network docker_default not found" and
      # "container name already in use" races.
      #
      # Set via $GITHUB_ENV (not job-level `env:`) because `${{ runner.name }}`
      # isn't resolved at job-level — only after runner assignment, i.e. at
      # step time. A job-level reference causes a workflow startup_failure.
      - name: Set compose project name
        # Stable per-runner name (not per-run): a per-run unique name makes the
        # pre-teardown below a no-op (new project doesn't exist yet), so volumes
        # from every prior run accumulate on disk until the host fills up.
        working-directory: backend-repo
        run: echo "COMPOSE_PROJECT_NAME=vc-${RUNNER_NAME}" >> "$GITHUB_ENV"

      - name: Tear down any prior project state for this runner
        # Scoped to this runner's project only — does NOT affect other runners'
        # running containers or networks.
        working-directory: backend-repo
        run: docker compose -f docker/docker-compose.integration.yaml down -v --remove-orphans || true

      - name: Prune unused volumes
        # Removes any volumes not attached to a running container (including
        # stale volumes from prior runs). Safe: Docker refuses to remove
        # in-use volumes regardless of this command.
        #
        # Try sudo-less first (the runner is typically in the docker group),
        # fall back to non-interactive `sudo -n`, then a LOUD warning — never a
        # silent `|| true`. A bare `sudo ... || true` here was the #1247 failure
        # mode: when the runner has no passwordless sudo, sudo aborts and
        # `|| true` swallows it, so the prune silently no-ops. Same sudo-less-
        # first approach as ci-host-janitor-hcl.yaml (PR #1370); we use `sudo -n`
        # in the fallback (vs the janitor's bare `sudo`) so it never blocks on a
        # password prompt.
        working-directory: backend-repo
        run: |
          docker volume prune -f \
            || sudo -n docker volume prune -f \
            || echo "::warning::volume prune failed (no passwordless sudo and runner not in docker group?) — stale volumes not reclaimed; see #1247"

      - name: Free disk space before heavy build
        # The `cargo tests` job was running the host out of disk ("No space
        # left on device") while building the actix-api test image and
        # spinning up the integration stack. The biggest accumulation is from
        # rebuilding docker/Dockerfile.actix.dev (FROM nixos/nix, multi-GB Nix
        # toolchain layers): every flake.nix/flake.lock/Dockerfile change leaves
        # the *previous* tagged dev image orphaned (untagged-by-overwrite or
        # simply no longer referenced), and the BuildKit cache grows unbounded.
        #
        # APPROACH (#1247): the daily `ci-host-janitor-hcl.yaml` now OWNS steady-state
        # daemon-wide cleanup — it reclaims the real hog (orphaned *tagged but unused* Nix
        # dev images, which dangling-only pruning cannot touch) with `image prune -af`, and
        # bounds the BuildKit cache (`builder prune --filter until=168h`) instead of nuking it.
        # This per-job step is therefore only a GATED safety net (see the run block): it prunes
        # ONLY when the disk is already tight (< 50 GiB free), and even then uses that SAME
        # cache-preserving image + bounded-builder prune — NOT `docker system prune -af`.
        #
        # Why this changed: the old step ran `system prune -af` UNCONDITIONALLY (every job,
        # even at 173 GiB free), which (a) cost ~3 min on the test critical path — a top
        # contributor to the 20-min timeout — and (b) nuked the shared BuildKit cache that all
        # 4 co-located hcl-ci runners reuse, forcing cold multi-GB Nix image rebuilds. Gating
        # it + dropping the cache-nuke fixes both. `--volumes` stays OMITTED (postgres/nats
        # data + the Nix store / cargo caches are never touched here; volume reclamation is the
        # per-runner `compose down -v` + `volume prune` steps above). The `df`/`docker system df`
        # brackets give before/after visibility; cleanup is loud-on-failure (no bare `|| true`).
        #
        # LEAKED CHROMIUM TEMP DIRS (the failure this job actually died from):
        # The Playwright/Chromium E2E jobs (`e2e-hcl.yaml`) run on this SAME
        # host and leak `/tmp/org.chromium.Chromium.scoped_dir.*` profile dirs
        # whenever a Chromium process is killed (OOM / timeout / "context
        # closed" crash) instead of closed gracefully — Chromium only removes
        # its own scratch dir on a clean shutdown. These accumulated to 177G
        # across ~1,900 dirs and filled the root disk to 97%, at which point
        # THIS backend job failed with `failed to create file .../fingerprint`
        # + `linking with cc failed` — i.e. ENOSPC masquerading as a link
        # error. `docker system prune` does NOT touch `/tmp`, so it freed
        # nothing against this leak. We sweep the STALE Chromium dirs here too.
        #
        # SHARED-HOST SAFETY for the /tmp sweep: 4 runners share this host and
        # a live test on another runner has an in-flight scoped_dir. We delete
        # ONLY dirs older than 24h (`-mmin +1440`, matching the build-logs
        # janitor precedent in daily-build-images-hcl.yaml) so an in-flight
        # browser's dir — at most ~1h old for the longest full suite — is NEVER
        # touched.
        #
        # #1247 — DO NOT swallow the prune failure. The previous version ran
        # `sudo docker system prune -af || true`; when the runner has no
        # passwordless sudo, `sudo` aborts ("a password is required") and the
        # `|| true` swallowed the abort, so the prune NEVER ran and the disk
        # stayed full — `cargo tests` then died with ENOSPC ("No space left on
        # device") masquerading as a `linking with cc failed` error. Fixes:
        #   1. Run the reclaim sudo-less FIRST (the runner is typically in the
        #      docker group, and /tmp dirs are owned by the runner's own browser
        #      processes), falling back to NON-INTERACTIVE `sudo -n` (never
        #      blocks on a password prompt), then a LOUD `::warning::`. Same
        #      sudo-less-first approach as ci-host-janitor-hcl.yaml (PR #1370),
        #      which already cleans /tmp on a schedule (it uses bare `sudo` in
        #      its fallback; `sudo -n` here is the fail-fast variant).
        #   2. VERIFY, don't assume: capture free space before/after and emit a
        #      `::warning::` if the disk did not shrink while it was already
        #      tight, so a no-op prune is VISIBLE instead of a false green.
        # If `::warning::` lines keep appearing, the host needs a passwordless
        # `/etc/sudoers.d` NOPASSWD entry for docker (or the runner user added
        # to the docker group) — host config outside this repo (see #1247).
        working-directory: backend-repo
        run: |
          # KiB available on the root FS, used for the before/after assertion.
          avail_kib() { df -P / | awk 'NR==2 {print $4}'; }
          before_kib="$(avail_kib)"

          echo "=== Disk usage BEFORE cleanup ==="
          df -h || true
          echo "=== Docker disk usage BEFORE cleanup ==="
          docker system df || sudo -n docker system df || true

          echo "=== Sweeping STALE (>24h) leaked Chromium temp profile dirs in /tmp ==="
          # Runner's own browser processes own these dirs, so try sudo-less first.
          find /tmp -maxdepth 1 -name "org.chromium.Chromium.scoped_dir.*" -type d -mmin +1440 -exec rm -rf {} + 2>/dev/null \
            || sudo -n find /tmp -maxdepth 1 -name "org.chromium.Chromium.scoped_dir.*" -type d -mmin +1440 -exec rm -rf {} + 2>/dev/null \
            || echo "::warning::Chromium /tmp sweep failed (no passwordless sudo?) — stale browser temp dirs not reclaimed; see #1247"

          # GATED, cache-PRESERVING prune (#1247). The daily ci-host-janitor now owns
          # steady-state daemon-wide cleanup; this per-job step only intervenes when the disk
          # is genuinely tight, so the common run pays NO prune cost and the shared BuildKit
          # cache the other 3 co-located runners reuse is preserved.
          #   * Gate at 50 GiB free (2x the 25 GiB ENOSPC headroom floor): skip entirely when
          #     there's room. The old code pruned UNCONDITIONALLY — ~3 min even at 173 GiB
          #     free — a top contributor to the 20-min timeout.
          #   * When it fires, use `image prune -af` (reclaims orphaned *tagged* Nix dev
          #     images — the real hog) + a BOUNDED `builder prune --filter until=168h` (trim
          #     >7d cache, keep recent warm), NOT `system prune -af` whose build-cache nuke
          #     forced cold multi-GB Nix rebuilds.
          #   * sudo-less FIRST, NON-INTERACTIVE `sudo -n` fallback, then a LOUD warning —
          #     never a bare `|| true` (see #1247).
          gate_kib=$((50 * 1024 * 1024))
          if [ "$before_kib" -lt "$gate_kib" ]; then
            echo "=== Disk tight (< 50 GiB free) — reclaiming unused images + bounding build cache (cache-preserving) ==="
            ( docker image prune -af && docker builder prune -f --filter until=168h ) \
              || ( sudo -n docker image prune -af && sudo -n docker builder prune -f --filter until=168h ) \
              || echo "::warning::docker prune FAILED (no passwordless sudo and runner not in docker group?) — disk NOT reclaimed; cargo tests may OOD. Host needs NOPASSWD docker or runner in docker group; see #1247"
          else
            echo "Disk healthy ($((before_kib / 1024 / 1024)) GiB free >= 50 GiB) — skipping prune to preserve the shared BuildKit cache; daily ci-host-janitor owns steady-state cleanup."
          fi

          echo "=== Disk usage AFTER cleanup ==="
          df -h || true
          echo "=== Docker disk usage AFTER cleanup ==="
          docker system df || sudo -n docker system df || true

          # VERIFY the reclaim actually freed space. Only warn when the disk was
          # already tight (<25 GiB free) AND nothing was reclaimed — on a roomy
          # host a no-op prune is expected and not worth a warning. 25 GiB floor
          # is just above the ~18 GiB at which #1247's compile hit ENOSPC.
          after_kib="$(avail_kib)"
          tight_kib=$((25 * 1024 * 1024))
          if [ "$after_kib" -lt "$tight_kib" ] && [ "$after_kib" -le "$before_kib" ]; then
            echo "::warning::Disk still tight after cleanup: ${after_kib} KiB free (was ${before_kib} KiB), under the 25 GiB headroom floor and NOT reduced — prune likely a no-op (sudo password? see #1247). cargo tests may fail with ENOSPC."
          fi

      - name: Pre-create target dirs to prevent Docker from initializing them as root
        working-directory: backend-repo
        run: mkdir -p actix-api/target

      - name: Generate WT dev cert for integration tests
        working-directory: backend-repo
        run: scripts/regen-dev-cert.sh --force

      - name: Set up sccache build cache (best-effort; #1414 / #1247)
        # Warms the cold cargo compile that remains after the prune was gated (deps like hkdf
        # rebuilt from scratch under CARGO_INCREMENTAL=0). The per-runner CARGO_TARGET_DIR on
        # the test step only stays warm on the SAME runner; sccache adds a HOST-SHARED cache so
        # a PR landing on any of the 4 co-located hcl-ci runners hits a warm cache (sccache hits
        # are content-addressed, so concurrent sharing across runners is safe). SCCACHE_CACHE_SIZE
        # bounds it so the cache can't refill the disk (the #1247 concern); the gated prune never
        # touches SCCACHE_DIR. sccache requires CARGO_INCREMENTAL=0 — already set in the job env.
        #
        # BEST-EFFORT: `set +e` + `exit 0` mean any failure (binary missing / download blocked)
        # just leaves RUSTC_WRAPPER unset and the build runs exactly as before — NO regression.
        # The pinned musl binary + URL + inner path were verified against the v0.15.0 release.
        run: |
          set +e
          bin=/var/lib/ci/bin/sccache
          ver=v0.15.0
          mkdir -p /var/lib/ci/bin /var/lib/ci/sccache
          scc="$(command -v sccache)"; { [ -z "$scc" ] && [ -x "$bin" ]; } && scc="$bin"
          if [ -z "$scc" ]; then
            url="https://github.com/mozilla/sccache/releases/download/${ver}/sccache-${ver}-x86_64-unknown-linux-musl.tar.gz"
            if curl -fsSL "$url" -o /tmp/sccache.tgz && tar -xzf /tmp/sccache.tgz -C /tmp; then
              install -m0755 "/tmp/sccache-${ver}-x86_64-unknown-linux-musl/sccache" "$bin" && scc="$bin"
            fi
          fi
          if [ -n "$scc" ] && "$scc" --version >/dev/null 2>&1; then
            {
              echo "RUSTC_WRAPPER=$scc"
              echo "SCCACHE_DIR=/var/lib/ci/sccache"
              echo "SCCACHE_CACHE_SIZE=20G"
              echo "SCCACHE_IDLE_TIMEOUT=0"
            } >> "$GITHUB_ENV"
            echo "sccache enabled: $("$scc" --version)"
          else
            echo "::warning::sccache unavailable — building without the cache wrapper (no regression); see #1414"
          fi
          exit 0

      - name: Run backend tests
        working-directory: backend-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: make tests_run

      - name: sccache stats
        if: always()
        # Hit-rate visibility (and proof the cache engaged). Non-fatal; no-op when sccache
        # wasn't set up (RUSTC_WRAPPER unset).
        run: |
          set +e
          [ -n "${RUSTC_WRAPPER:-}" ] && "$RUSTC_WRAPPER" --show-stats
          exit 0

      - name: Teardown
        if: always()
        working-directory: backend-repo
        run: make tests_down
