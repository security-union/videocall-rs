name: Backend Tests (HCL)

on:
  pull_request:
    branches: [hcl-main, PR-staging]
    paths:
      - 'actix-api/**'
      - 'meeting-api/**'
      - 'videocall-types/**'
      - 'videocall-meeting-types/**'
      - 'protobuf/**'
      - 'dbmate/**'
      - 'docker/docker-compose.integration.yaml'
      - 'docker/Dockerfile.actix.dev'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/pr-check-backend-hcl.yaml'

concurrency:
  group: pr-check-backend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  CARGO_HOME: /var/lib/ci/cargo
  RUSTUP_HOME: /var/lib/ci/rustup
  CARGO_INCREMENTAL: "0"
  PATH: /var/lib/ci/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  test:
    name: cargo tests
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 20
    concurrency:
      group: hcl-ci-backend
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          clean: false
          path: backend-repo

      # Isolate this runner's docker compose project from the other 3 runners
      # on the same host. Without this, parallel jobs share the same
      # `docker_default` network and `docker-postgres-1`/`docker-nats-1`
      # containers, which causes "network docker_default not found" and
      # "container name already in use" races.
      #
      # Set via $GITHUB_ENV (not job-level `env:`) because `${{ runner.name }}`
      # isn't resolved at job-level — only after runner assignment, i.e. at
      # step time. A job-level reference causes a workflow startup_failure.
      - name: Set compose project name
        # Stable per-runner name (not per-run): a per-run unique name makes the
        # pre-teardown below a no-op (new project doesn't exist yet), so volumes
        # from every prior run accumulate on disk until the host fills up.
        working-directory: backend-repo
        run: echo "COMPOSE_PROJECT_NAME=vc-${RUNNER_NAME}" >> "$GITHUB_ENV"

      - name: Tear down any prior project state for this runner
        # Scoped to this runner's project only — does NOT affect other runners'
        # running containers or networks.
        working-directory: backend-repo
        run: docker compose -f docker/docker-compose.integration.yaml down -v --remove-orphans || true

      - name: Prune unused volumes
        # Removes any volumes not attached to a running container (including
        # stale volumes from prior runs). Safe: Docker refuses to remove
        # in-use volumes regardless of this command.
        working-directory: backend-repo
        run: sudo docker volume prune -f || true

      - name: Free disk space before heavy build
        # The `cargo tests` job was running the host out of disk ("No space
        # left on device") while building the actix-api test image and
        # spinning up the integration stack. The biggest accumulation is from
        # rebuilding docker/Dockerfile.actix.dev (FROM nixos/nix, multi-GB Nix
        # toolchain layers): every flake.nix/flake.lock/Dockerfile change leaves
        # the *previous* tagged dev image orphaned (untagged-by-overwrite or
        # simply no longer referenced), and the BuildKit cache grows unbounded.
        #
        # ESCALATION: a prior dangling-only prune (`docker image prune -f` +
        # `docker builder prune -f`) was validated in CI and freed essentially
        # nothing — the root disk was 100% full (500G/500G before AND after).
        # The 500G is held by *tagged but unused* images (orphaned Nix dev
        # images) that dangling-only pruning cannot touch. So we escalate to
        # `docker system prune -af`.
        #
        # SHARED, SELF-HOSTED RUNNER SAFETY:
        # This host runs 4 hcl-ci runners against ONE docker daemon.
        #   * `-af` removes ALL images not *currently in use* by a container
        #     (plus stopped containers, unused networks, and build cache).
        #     "Unused" means not referenced by a running/created container —
        #     so every other concurrent job's running containers AND their
        #     images are preserved. A concurrent job that merely *expected* a
        #     cached image it isn't actively running will re-pull/rebuild it:
        #     slower, not broken.
        #   * `--volumes` is deliberately OMITTED. Named volumes (postgres/nats
        #     data, the Nix store and cargo caches used by other runners) are
        #     NEVER deleted by this step. Volume reclamation stays scoped to
        #     the per-runner steps above (`compose down -v` + `volume prune`).
        # The `df -h` / `docker system df` brackets give visibility into how
        # much was reclaimed; `|| true` ensures a cleanup hiccup never fails
        # the test job.
        #
        # LEAKED CHROMIUM TEMP DIRS (the failure this job actually died from):
        # The Playwright/Chromium E2E jobs (`e2e-hcl.yaml`) run on this SAME
        # host and leak `/tmp/org.chromium.Chromium.scoped_dir.*` profile dirs
        # whenever a Chromium process is killed (OOM / timeout / "context
        # closed" crash) instead of closed gracefully — Chromium only removes
        # its own scratch dir on a clean shutdown. These accumulated to 177G
        # across ~1,900 dirs and filled the root disk to 97%, at which point
        # THIS backend job failed with `failed to create file .../fingerprint`
        # + `linking with cc failed` — i.e. ENOSPC masquerading as a link
        # error. `docker system prune` does NOT touch `/tmp`, so it freed
        # nothing against this leak. We sweep the STALE Chromium dirs here too.
        #
        # SHARED-HOST SAFETY for the /tmp sweep: 4 runners share this host and
        # a live test on another runner has an in-flight scoped_dir. We delete
        # ONLY dirs older than 24h (`-mmin +1440`, matching the build-logs
        # janitor precedent in daily-build-images-hcl.yaml) so an in-flight
        # browser's dir — at most ~1h old for the longest full suite — is NEVER
        # touched. `2>/dev/null || true` keeps a sweep hiccup non-fatal.
        working-directory: backend-repo
        run: |
          echo "=== Disk usage BEFORE cleanup ==="
          df -h || true
          echo "=== Docker disk usage BEFORE cleanup ==="
          sudo docker system df || true
          echo "=== Sweeping STALE (>24h) leaked Chromium temp profile dirs in /tmp ==="
          sudo find /tmp -maxdepth 1 -name "org.chromium.Chromium.scoped_dir.*" -type d -mmin +1440 -exec rm -rf {} \; 2>/dev/null || true
          echo "=== Pruning ALL unused images + stopped containers + networks + build cache (volumes preserved) ==="
          sudo docker system prune -af || true
          echo "=== Disk usage AFTER cleanup ==="
          df -h || true
          echo "=== Docker disk usage AFTER cleanup ==="
          sudo docker system df || true

      - name: Pre-create target dirs to prevent Docker from initializing them as root
        working-directory: backend-repo
        run: mkdir -p actix-api/target

      - name: Generate WT dev cert for integration tests
        working-directory: backend-repo
        run: scripts/regen-dev-cert.sh --force

      - name: Run backend tests
        working-directory: backend-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: make tests_run

      - name: Teardown
        if: always()
        working-directory: backend-repo
        run: make tests_down
