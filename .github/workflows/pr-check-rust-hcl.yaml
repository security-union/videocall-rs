name: Rust Check (HCL)

on:
  pull_request:
    branches: [hcl-main, PR-staging]
    paths:
      - 'actix-api/**'
      - 'meeting-api/**'
      - 'videocall-client/**'
      - 'videocall-codecs/**'
      - 'videocall-types/**'
      - 'videocall-meeting-types/**'
      - 'videocall-meeting-client/**'
      - 'videocall-transport/**'
      - 'videocall-diagnostics/**'
      - 'videocall-aq/**'
      - 'videocall-netsim/**'
      - 'videocall-sdk/**'
      - 'videocall-cli/**'
      - 'bot/**'
      - 'vcprobe/**'
      - 'dioxus-ui/**'
      - 'neteq/**'
      - 'protobuf/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      # Trigger on edits to this workflow itself so a PR changing the Rust gate
      # is validated by the gate it changes (matches pr-check-backend-hcl.yaml).
      - '.github/workflows/pr-check-rust-hcl.yaml'

concurrency:
  group: pr-check-rust-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  CARGO_HOME: /var/lib/ci/cargo
  RUSTUP_HOME: /var/lib/ci/rustup
  CARGO_INCREMENTAL: "0"
  PATH: /var/lib/ci/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  fmt:
    name: cargo fmt
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          clean: false
          path: rust-repo
      - name: cargo fmt check
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          clean: false
          path: rust-repo
      - name: clippy (native targets)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo clippy --all -- -D warnings
      # `cargo clippy --all` lints library/binary targets but NOT test
      # targets, so deny-by-default lints inside `#[test]` /
      # `#[wasm_bindgen_test]` code go uncaught (e.g. PR #1192 nearly
      # shipped a `clippy::absurd_extreme_comparisons` — `selected <= 0`
      # where `selected: u32` — in a test). Lint videocall-client's test
      # targets on the wasm target (its tests are wasm-bindgen) to close
      # that gap. wasm32-unknown-unknown is assumed installed on the
      # runner, same as the wasm-check job below.
      - name: clippy (wasm test targets)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo clippy --target wasm32-unknown-unknown -p videocall-client --tests -- -D warnings
      # videocall-aq, videocall-codecs, and neteq run NATIVE libtest (see the
      # `cargo test videocall-aq` / `cargo test videocall-codecs` /
      # `cargo test neteq` steps in the wasm-test job), so they are linted on
      # the host target with NO `--target wasm32-unknown-unknown`. `cargo clippy
      # --all` does not lint test targets, so deny-by-default lints in their
      # `#[test]` code went uncaught — the same gap #1211 closed for
      # videocall-client's wasm tests.
      - name: clippy (videocall-aq test targets)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo clippy -p videocall-aq --tests -- -D warnings
      - name: clippy (videocall-codecs test targets)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo clippy -p videocall-codecs --tests -- -D warnings
      - name: clippy (neteq test targets)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo clippy -p neteq --tests -- -D warnings

  wasm-check:
    name: wasm32 check
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          clean: false
          path: rust-repo
      - name: cargo check videocall-client (default features)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo check --target wasm32-unknown-unknown -p videocall-client
      - name: cargo check videocall-client (no-default-features)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo check --target wasm32-unknown-unknown --no-default-features -p videocall-client
      - name: cargo check dioxus-ui
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo check --target wasm32-unknown-unknown -p videocall-ui

  wasm-test:
    name: wasm-pack tests
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          clean: false
          path: rust-repo
      - name: wasm-pack test videocall-client
        working-directory: rust-repo/videocall-client
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: wasm-pack test --node
      # `wasm-pack test --node` ONLY discovers `#[wasm_bindgen_test]`. The
      # connection-manager regression suite (reconnection, re-election,
      # self-filter, CPU-stall RTT suppression) is ~160 plain libtest
      # `#[test]` fns that wasm-pack silently skips. videocall-client DOES
      # compile on the native host target (verified: `cargo test -p
      # videocall-client --lib --no-run` builds; 279 lib tests, incl. 118
      # connection_manager tests, pass), so run them natively here. (#1005)
      - name: cargo test videocall-client (native libtest)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo test -p videocall-client --lib
      - name: cargo test videocall-codecs
        working-directory: rust-repo/videocall-codecs
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo test
      - name: cargo test neteq
        working-directory: rust-repo/neteq
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo test --no-default-features --features web
      # videocall-aq is pure host-testable arithmetic (p75 aggregation,
      # hysteresis, layer-shed, PID). Its 180+ regression tests are plain
      # libtest `#[test]` (only 4 are `#[wasm_bindgen_test]`), so wasm-pack
      # would silently skip them. Run them natively here so AQ gets a real
      # test gate, not just `cargo clippy --all`.
      - name: cargo test videocall-aq (native)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo test -p videocall-aq --lib
      # videocall-transport has host-testable WebTransport helpers with
      # plain libtest `#[test]` coverage. wasm-pack only discovers
      # `#[wasm_bindgen_test]`, and clippy compiles the library but not its
      # test target, so run the native lib tests explicitly.
      - name: cargo test videocall-transport (native)
        working-directory: rust-repo
        env:
          CARGO_TARGET_DIR: /var/lib/ci/target/${{ runner.name }}
        run: cargo test -p videocall-transport --lib
