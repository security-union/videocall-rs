name: PR Preview Cleanup on Close

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Cleanup preview environment
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubectl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup kubectl context
        run: |
          doctl kubernetes cluster kubeconfig save videocall-us-east

      - name: Find deployment slot
        id: find-slot
        run: |
          PR_NUM=${{ github.event.pull_request.number }}

          # Find which slot this PR is using
          SLOT=$(kubectl get namespaces -l app=preview,pr=${PR_NUM} \
            -o jsonpath='{.items[0].metadata.labels.slot}' 2>/dev/null)

          if [ -z "$SLOT" ]; then
            echo "No preview environment found for PR #${PR_NUM}, nothing to cleanup"
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "PR #${PR_NUM} is deployed in slot ${SLOT}, will cleanup"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "slot=${SLOT}" >> $GITHUB_OUTPUT
          fi

      - name: Delete namespace
        if: steps.find-slot.outputs.exists == 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          SLOT=${{ steps.find-slot.outputs.slot }}
          NAMESPACE="preview-slot-${SLOT}"

          echo "Deleting namespace: ${NAMESPACE} (slot ${SLOT}, PR #${PR_NUM})"
          kubectl delete namespace ${NAMESPACE} --ignore-not-found=true

          echo "✅ Namespace deleted"
          echo "✅ Slot ${SLOT} is now available"

      - name: Drop postgres database
        if: steps.find-slot.outputs.exists == 'true'
        run: |
          SLOT=${{ steps.find-slot.outputs.slot }}
          DB_NAME="preview_slot_${SLOT}"

          echo "Dropping database: ${DB_NAME} (slot ${SLOT})"

          # Get postgres password from secret
          PG_PASSWORD=$(kubectl get secret postgres-credentials -n default -o jsonpath='{.data.password}' | base64 -d)

          # Drop database
          kubectl exec -n default postgres-postgresql-0 -- \
            env PGPASSWORD="${PG_PASSWORD}" psql -U postgres -c "DROP DATABASE IF EXISTS ${DB_NAME};" || {
              echo "⚠️  Failed to drop database, may need manual cleanup"
            }

          echo "✅ Database dropped for slot ${SLOT}"

      - name: Delete GHCR images
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const packages = [
              'videocall-media-server',
              'videocall-meeting-api',
              'videocall-web-ui'
            ];

            // Detect if owner is a user or organization
            const owner = context.repo.owner;
            const { data: ownerInfo } = await github.rest.users.getByUsername({
              username: owner
            });
            const isOrg = ownerInfo.type === 'Organization';

            console.log(`Owner "${owner}" is a ${ownerInfo.type}`);

            for (const packageName of packages) {
              try {
                // Get package versions using appropriate API
                const versions = isOrg
                  ? await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                      package_type: 'container',
                      package_name: packageName,
                      org: owner
                    })
                  : await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                      package_type: 'container',
                      package_name: packageName,
                      username: owner
                    });

                // Find the pr-{NUM} tagged version
                const prTag = `pr-${prNumber}`;
                const targetVersion = versions.data.find(v =>
                  v.metadata?.container?.tags?.includes(prTag)
                );

                if (targetVersion) {
                  // Delete using appropriate API
                  if (isOrg) {
                    await github.rest.packages.deletePackageVersionForOrg({
                      package_type: 'container',
                      package_name: packageName,
                      org: owner,
                      package_version_id: targetVersion.id
                    });
                  } else {
                    await github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container',
                      package_name: packageName,
                      username: owner,
                      package_version_id: targetVersion.id
                    });
                  }
                  console.log(`✅ Deleted ${packageName}:${prTag}`);
                } else {
                  console.log(`⚠️  Image ${packageName}:${prTag} not found`);
                }
              } catch (error) {
                console.log(`⚠️  Failed to delete ${packageName}: ${error.message}`);
              }
            }

            console.log('✅ GHCR cleanup complete');

      - name: Summary
        if: steps.find-slot.outputs.exists == 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          SLOT=${{ steps.find-slot.outputs.slot }}
          echo "✅ Cleanup complete for PR #${PR_NUM} (slot ${SLOT})"
          echo ""
          echo "Removed:"
          echo "  - Namespace preview-slot-${SLOT}"
          echo "  - Database preview_slot_${SLOT}"
          echo "  - GHCR images tagged pr-${PR_NUM}"
          echo ""
          echo "📊 Slot ${SLOT} is now available for other PRs"
