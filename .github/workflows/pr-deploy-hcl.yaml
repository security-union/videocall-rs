name: Deploy PR Preview

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-permissions:
    name: Check permissions
    runs-on: [self-hosted, linux, docker]
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy') || startsWith(github.event.comment.body, '/build-and-deploy'))
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      pr_number: ${{ steps.get-pr.outputs.pr_number }}
      pr_sha: ${{ steps.get-pr.outputs.pr_sha }}
      pr_ref: ${{ steps.get-pr.outputs.pr_ref }}
      is_build_and_deploy: ${{ steps.check-command.outputs.is_build_and_deploy }}
    steps:
      - name: Get PR details
        id: get-pr
        run: |
          PR_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://github01.hclpnp.com/api/v3/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
          PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
          PR_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "pr_sha=${PR_SHA}" >> $GITHUB_OUTPUT
          echo "pr_ref=${PR_REF}" >> $GITHUB_OUTPUT

      - name: Check command
        id: check-command
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          if [[ "$COMMENT_BODY" == "/build-and-deploy"* ]]; then
            echo "is_build_and_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "is_build_and_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if user is maintainer
        id: check
        run: |
          ASSOCIATION="${{ github.event.comment.author_association }}"
          echo "User association: $ASSOCIATION"
          if [[ "$ASSOCIATION" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
            echo "✅ User is authorized"
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "❌ User is not authorized"
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: React to comment (processing)
        if: steps.check.outputs.authorized == 'true'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://github01.hclpnp.com/api/v3/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -d '{"content":"rocket"}'

      - name: Comment deployment started
        if: steps.check.outputs.authorized == 'true'
        run: |
          MAX_SLOTS='${{ vars.PR_PREVIEW_MAX_SLOTS }}'
          MAX_SLOTS=${MAX_SLOTS:-3}

          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://github01.hclpnp.com/api/v3/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -d "{\"body\":\"🚀 **Deploying PR preview to available slot...**\n\nStarted by @${{ github.event.comment.user.login }}\n\n**Infrastructure:**\n- Assigning deployment slot (1-${MAX_SLOTS} available)\n- Creating namespace & database for the slot\n- Deploying NATS, WebSocket, Meeting API, and UI\n\n⏱️ Deployment typically takes 3-5 minutes.\n\n[View deployment logs](https://github01.hclpnp.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}"

      - name: Post error if unauthorized
        if: steps.check.outputs.authorized == 'false'
        run: |
          ASSOCIATION="${{ github.event.comment.author_association }}"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://github01.hclpnp.com/api/v3/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -d "{\"body\":\"❌ **Permission denied**\n\n@${{ github.event.comment.user.login }}, only repository maintainers can deploy preview environments.\n\n**Your role**: \\\`${ASSOCIATION}\\\`\n**Required roles**: \\\`OWNER\\\`, \\\`MEMBER\\\`, or \\\`COLLABORATOR\\\`\"}"
          exit 1

  build:
    name: Build images
    needs: check-permissions
    if: |
      needs.check-permissions.outputs.authorized == 'true' &&
      needs.check-permissions.outputs.is_build_and_deploy == 'true'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Checkout code
        run: |
          rm -rf /tmp/build-${{ needs.check-permissions.outputs.pr_number }}
          mkdir -p /tmp/build-${{ needs.check-permissions.outputs.pr_number }}
          cd /tmp/build-${{ needs.check-permissions.outputs.pr_number }}
          git clone https://github01.hclpnp.com/labs-projects/videocall.git .
          git checkout ${{ needs.check-permissions.outputs.pr_sha }}

      - name: Login to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          echo "$HARBOR_PASSWORD" | docker login hclcr.io -u "$HARBOR_USERNAME" --password-stdin

      - name: Build and push all images
        env:
          REGISTRY: ${{ vars.DOCKER_REGISTRY }}
        run: |
          cd /tmp/build-${{ needs.check-permissions.outputs.pr_number }}
          PR_NUM=${{ needs.check-permissions.outputs.pr_number }}

          echo "Building media server..."
          ./cut_build_push_backend.sh pr-${PR_NUM}

          echo "Building meeting API..."
          ./cut_build_push_meeting_api.sh pr-${PR_NUM}

          echo "Building UI..."
          ./cut_build_push_ui.sh pr-${PR_NUM}

      - name: Cleanup build directory
        if: always()
        run: rm -rf /tmp/build-${{ needs.check-permissions.outputs.pr_number }}

  deploy:
    name: Deploy preview environment
    needs: [check-permissions, build]
    if: |
      always() &&
      needs.check-permissions.outputs.authorized == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    uses: ./.github/workflows/pr-deploy-reusable-hcl.yaml
    with:
      pr_number: ${{ needs.check-permissions.outputs.pr_number }}
      pr_sha: ${{ needs.check-permissions.outputs.pr_sha }}
      comment_id: ${{ github.event.comment.id }}
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
