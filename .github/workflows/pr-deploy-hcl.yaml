name: Deploy PR Preview

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-deploy-${{ github.event.issue.number }}-hcl
  cancel-in-progress: false

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  check-permissions:
    name: Check permissions
    runs-on: [self-hosted, linux, docker]
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy') || startsWith(github.event.comment.body, '/build-and-deploy'))
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      pr_number: ${{ steps.get-pr.outputs.pr_number }}
      pr_sha: ${{ steps.get-pr.outputs.pr_sha }}
      pr_ref: ${{ steps.get-pr.outputs.pr_ref }}
      is_build_and_deploy: ${{ steps.check-command.outputs.is_build_and_deploy }}
      comment_id: ${{ github.event.comment.id }}
    steps:
      - name: Setup PATH
        run: echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Get PR details
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('pr_number', context.issue.number);
            core.setOutput('pr_sha', pr.data.head.sha);
            core.setOutput('pr_ref', pr.data.head.ref);
            return pr.data;

      - name: Check command
        id: check-command
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = context.payload.comment.body;
            const isBuildAndDeploy = commentBody.startsWith('/build-and-deploy');
            core.setOutput('is_build_and_deploy', isBuildAndDeploy ? 'true' : 'false');
            return isBuildAndDeploy;

      - name: Check if user is maintainer
        id: check
        run: |
          ASSOCIATION="${{ github.event.comment.author_association }}"
          echo "User association: $ASSOCIATION"
          if [[ "$ASSOCIATION" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
            echo "✅ User is authorized"
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "❌ User is not authorized"
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: React to comment (processing)
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Comment deployment started
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const maxSlots = '${{ vars.PR_PREVIEW_MAX_SLOTS }}' || '3';
            const isBuildAndDeploy = '${{ steps.check-command.outputs.is_build_and_deploy }}' === 'true';
            const user = context.payload.comment.user.login;
            const runId = context.runId;
            const repo = context.repo.owner + '/' + context.repo.repo;

            let body;
            if (isBuildAndDeploy) {
              body = `🔨 **Building images and deploying PR preview...**

            Started by @${user}

            **Phase 1: Build Docker images (5-7 minutes)**
            - Media Server (WebSocket/WebTransport)
            - Meeting API (REST backend)
            - Web UI (WASM frontend)

            **Phase 2: Deploy to slot (3-5 minutes)**
            - Assign deployment slot (1-${maxSlots} available)
            - Create namespace & database
            - Deploy NATS, WebSocket, Meeting API, and UI

            ⏱️ Total time: approximately 10-12 minutes.

            [View workflow logs](https://github01.hclpnp.com/${repo}/actions/runs/${runId})`;
            } else {
              body = `🚀 **Deploying PR preview to available slot...**

            Started by @${user}

            **Infrastructure:**
            - Assigning deployment slot (1-${maxSlots} available)
            - Creating namespace & database for the slot
            - Deploying NATS, WebSocket, Meeting API, and UI

            ⏱️ Deployment typically takes 3-5 minutes.

            [View deployment logs](https://github01.hclpnp.com/${repo}/actions/runs/${runId})`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: Post error if unauthorized
        if: steps.check.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const association = context.payload.comment.author_association;
            const user = context.payload.comment.user.login;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Permission denied**

            @${user}, only repository maintainers can deploy preview environments.

            **Your role**: \`${association}\`
            **Required roles**: \`OWNER\`, \`MEMBER\`, or \`COLLABORATOR\``
            });
            core.setFailed('User not authorized');

  build:
    name: Build images At HCL
    needs: check-permissions
    if: |
      needs.check-permissions.outputs.authorized == 'true' &&
      needs.check-permissions.outputs.is_build_and_deploy == 'true'
    uses: ./.github/workflows/pr-build-images-reusable-hcl.yaml
    with:
      pr_number: ${{ needs.check-permissions.outputs.pr_number }}
      pr_sha: ${{ needs.check-permissions.outputs.pr_sha }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

  build-success:
    name: Comment on build success
    needs: [check-permissions, build]
    if: needs.check-permissions.outputs.authorized == 'true' && needs.build.result == 'success'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Comment build success
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            const registry = '${{ vars.DOCKER_REGISTRY }}' || 'hclcr.io/hcllabs';
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Images built successfully!**

            **Images:**
            - \`${registry}/videocall-media-server:pr-${prNumber}\`
            - \`${registry}/videocall-meeting-api:pr-${prNumber}\`
            - \`${registry}/videocall-web-ui:pr-${prNumber}\`

            🚀 **Deploying to preview environment now...**

            Deployment typically takes 3-5 minutes.`
            });

      - name: React to comment (success)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'hooray'
            })

  build-failure:
    name: Comment on build failure
    needs: [check-permissions, build]
    if: always() && needs.check-permissions.outputs.authorized == 'true' && needs.build.result == 'failure'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Post build failure comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            const repo = context.repo.owner + '/' + context.repo.repo;
            const runId = context.runId;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Build failed**

            Check the [workflow logs](https://github01.hclpnp.com/${repo}/actions/runs/${runId}) for details.`
            });

      - name: React to comment (failure)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            })

  deploy:
    name: Deploy preview environment
    needs: [check-permissions, build]
    if: |
      always() &&
      needs.check-permissions.outputs.authorized == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    uses: ./.github/workflows/pr-deploy-reusable-hcl.yaml
    with:
      pr_number: ${{ needs.check-permissions.outputs.pr_number }}
      pr_sha: ${{ needs.check-permissions.outputs.pr_sha }}
      comment_id: ${{ github.event.comment.id }}
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
