name: Style token guardrails

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  style-token-guardrails:
    name: Style token guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for hardcoded color literals
        run: |
          git fetch origin "${{ github.base_ref }}"
          git reset --mixed "origin/${{ github.base_ref }}"
          bash scripts/check-hardcoded-colors.sh --unstaged

      - name: Check token drift
        run: bash scripts/check-token-drift.sh
