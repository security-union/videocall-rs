name: Undeploy PR Preview (HCL)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-undeploy-${{ github.event.issue.number }}-hcl
  cancel-in-progress: false

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  KUBECONFIG: /home/jenkins/.kube/k3s-config

jobs:
  check-permissions:
    name: Check permissions
    runs-on: [self-hosted, linux, docker]
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/undeploy')
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      pr_number: ${{ github.event.issue.number }}
    steps:
      - name: Setup PATH
        run: echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Check if user is maintainer
        id: check
        run: |
          ASSOCIATION="${{ github.event.comment.author_association }}"
          echo "User association: $ASSOCIATION"
          if [[ "$ASSOCIATION" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
            echo "✅ User is authorized"
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "❌ User is not authorized"
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: React to comment (processing)
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            })

      - name: Post error if unauthorized
        if: steps.check.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const association = context.payload.comment.author_association;
            const user = context.payload.comment.user.login;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Permission denied**

            @${user}, only repository maintainers can undeploy preview environments.

            **Your role**: \`${association}\`
            **Required roles**: \`OWNER\`, \`MEMBER\`, or \`COLLABORATOR\``
            });
            core.setFailed('User not authorized');

  undeploy:
    name: Undeploy preview environment
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Setup PATH
        run: echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Validate kubectl and kubeconfig access
        run: |
          test -f "${KUBECONFIG}"
          test -r "${KUBECONFIG}"
          kubectl config current-context
          CLUSTER_INFO=$(kubectl cluster-info)
          echo "${CLUSTER_INFO}"
          # Strip ANSI color codes before grep (kubectl outputs colors even when not a TTY)
          echo "${CLUSTER_INFO}" | sed 's/\x1b\[[0-9;]*m//g' | grep -F "Kubernetes control plane is running at https://10.190.252.83:8443"

      - name: Find deployment slot
        id: find-slot
        run: |
          PR_NUM=${{ needs.check-permissions.outputs.pr_number }}

          # Find which slot this PR is using
          # || true: kubectl exits 1 when jsonpath hits an empty array (no match);
          # suppress that so -e doesn't kill the script before the [ -z ] check.
          SLOT=$(kubectl get namespaces -l app=preview,pr=${PR_NUM} \
            -o jsonpath='{.items[0].metadata.labels.slot}' 2>/dev/null || true)

          if [ -z "$SLOT" ]; then
            echo "PR #${PR_NUM} is not deployed"
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "PR #${PR_NUM} is deployed in slot ${SLOT}"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "slot=${SLOT}" >> $GITHUB_OUTPUT
          fi

      - name: Delete namespace
        if: steps.find-slot.outputs.exists == 'true'
        run: |
          PR_NUM=${{ needs.check-permissions.outputs.pr_number }}
          SLOT=${{ steps.find-slot.outputs.slot }}
          NAMESPACE="preview-slot-${SLOT}"

          echo "Deleting namespace: ${NAMESPACE} (slot ${SLOT}, PR #${PR_NUM})"
          kubectl delete namespace ${NAMESPACE} --ignore-not-found=true

          echo "✅ Namespace deleted (includes NATS and all services)"
          echo "✅ Slot ${SLOT} is now available"

      - name: Drop postgres database
        if: steps.find-slot.outputs.exists == 'true'
        run: |
          SLOT=${{ steps.find-slot.outputs.slot }}
          DB_NAME="preview_slot_${SLOT}"

          echo "Dropping database: ${DB_NAME} (slot ${SLOT})"

          # Get postgres password from secret in preview-infra namespace
          # || true: prevents -e from exiting if the secret doesn't exist
          PG_PASSWORD=$(kubectl get secret postgres-credentials -n preview-infra \
            -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)

          if [ -z "$PG_PASSWORD" ]; then
            echo "⚠️  Failed to get postgres credentials, skipping database drop"
          else
            if kubectl exec -n preview-infra postgres-postgresql-0 -- \
              env PGPASSWORD="${PG_PASSWORD}" psql -U postgres -c "DROP DATABASE IF EXISTS ${DB_NAME};" 2>&1; then
              echo "✅ Database dropped for slot ${SLOT}"
            else
              echo "⚠️ Failed to drop database (may not exist or already dropped)"
            fi
          fi

      - name: Delete Harbor images (optional)
        if: steps.find-slot.outputs.exists == 'true'
        continue-on-error: true
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          # Note: Image retention handled by Harbor retention policy
          # Configured to delete pr-* tagged images older than 14 days
          # Policy runs automatically via Harbor's scheduled task system
          # To verify: https://hclcr.io/harbor/projects/hcllabs → Policy → Retention

          echo "⚠️  Images retained - Harbor retention policy will purge after 14 days"

      - name: React to comment (success)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'hooray'
            })

      - name: Post success comment
        if: steps.find-slot.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            const slot = '${{ steps.find-slot.outputs.slot }}';
            const user = context.payload.comment.user.login;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Preview undeployed - slot ${slot} freed**

            Cleaned up by @${user}

            **Resources removed:**
            - Namespace \`preview-slot-${slot}\` (includes all pods and services)
            - Database \`preview_slot_${slot}\`
            - Harbor images tagged \`pr-${prNumber}\` (via retention policy)

            📊 **Slot ${slot} is now available** for other PRs.

            You can redeploy by commenting \`/build-and-deploy\` again.`
            });

      - name: Post not-found comment
        if: steps.find-slot.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `ℹ️ **No preview environment found**

            PR #${prNumber} is not currently deployed to any slot.

            To deploy, comment \`/build-and-deploy\`.`
            });

  comment-failure:
    name: Comment on undeploy failure
    needs: [check-permissions, undeploy]
    if: always() && needs.check-permissions.outputs.authorized == 'true' && needs.undeploy.result == 'failure'
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Post undeploy failure comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.check-permissions.outputs.pr_number }};
            const repo = context.repo.owner + '/' + context.repo.repo;
            const runId = context.runId;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Undeploy failed**

            Check the [workflow logs](https://github01.hclpnp.com/${repo}/actions/runs/${runId}) for details.`
            });

      - name: React to comment (failure)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            })
