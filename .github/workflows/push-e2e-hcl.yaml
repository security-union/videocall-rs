name: E2E Tests (HCL)

on:
  push:
    branches: [hcl-main, PR-staging]
  workflow_dispatch:

concurrency:
  group: e2e-hcl
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: [self-hosted, linux, x64, hcl-ci]
    timeout-minutes: 60

    steps:
      - name: Clean workspace (root-owned files from Docker)
        run: |
          sudo find . -mindepth 1 -delete 2>/dev/null || true
          sudo rm -rf /var/lib/ghrunner/_work/videocall/videocall/* 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies and Playwright browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium

      - name: Build E2E stack images
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml build

      - name: Start E2E stack
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for dioxus-ui to be ready..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "dioxus-ui ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "Waiting for meeting-api..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/session > /dev/null 2>&1 || \
               curl -so /dev/null -w '%{http_code}' http://localhost:8081/session 2>/dev/null | grep -q '401'; then
              echo "meeting-api ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "Waiting for websocket-api..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1 || \
               curl -so /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null | grep -qE '2[0-9][0-9]|4[0-9][0-9]'; then
              echo "websocket-api ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml logs

      - name: Teardown (preserve volumes for cache)
        if: always()
        run: docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml down
