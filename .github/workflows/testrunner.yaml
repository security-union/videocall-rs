name: Test Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, Linux]

    steps:
      - name: Add tools to PATH
        run: |
          echo "/home/jenkins/bin" >> $GITHUB_PATH

      - name: Check environment
        run: |
          echo "Runner: $(hostname)"
          whoami
          pwd
          printenv | grep PATH
          ls -la /home/jenkins/bin

      - name: Check Docker
        run: docker --version

      - name: Check Helm
        run: helm version

      - name: Test kubectl access
        run: |
          kubectl get nodes
          kubectl get namespaces | grep preview-infra