name: WebAssembly Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'videocall-client/**'
      - 'videocall-codecs/**'
      - 'videocall-types/**'
      - 'protobuf/**'
      - 'dioxus-ui/**'
  pull_request:
    paths:
      - 'videocall-client/**'
      - 'videocall-codecs/**'
      - 'neteq/**'
      - 'videocall-types/**'
      - 'protobuf/**'
      - 'dioxus-ui/**'

jobs:
  wasm-test:
    name: WebAssembly Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
          profile: minimal

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install libvpx
        run: sudo apt-get update && sudo apt-get install -y libvpx-dev

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run wasm-pack tests for videocall-client
        run: cd videocall-client && wasm-pack test --node

      - name: Run tests for videocall-codecs (default, C-free)
        run: cd videocall-codecs && cargo test

      - name: Run oracle tests for videocall-codecs (libvpx)
        run: cargo test -p videocall-codecs --features "libvpx test-utils"

      - name: Run tests for neteq
        run: cd neteq && cargo test --no-default-features --features web

  dioxus-ui-component-tests:
    name: Dioxus UI Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-dioxus-tests-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dioxus-tests-

      - uses: nanasess/setup-chromedriver@v2

      - name: Run dioxus-ui component tests
        run: |
          # device_integration's getUserMedia/fake-device path intermittently
          # hangs the Chrome renderer (chromedriver's 300s "Timed out receiving
          # message from renderer"), independent of the runtime-leak teardown
          # fix. --no-fail-fast (below) stops one flaky binary from masking the
          # other 7; this bounded retry rides out the transient renderer hang.
          max_attempts=2
          attempt=1
          while true; do
            echo "::group::dioxus-ui component tests (attempt ${attempt}/${max_attempts})"
            if nix develop .#frontend --command bash -c "\
              cd dioxus-ui && \
              CHROMEDRIVER=$(which chromedriver) cargo test --target wasm32-unknown-unknown --no-fail-fast"; then
              echo "::endgroup::"
              echo "dioxus-ui component tests passed on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::dioxus-ui component tests failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "::warning::dioxus-ui component tests failed on attempt ${attempt}; retrying (headless-Chrome renderer flake)"
            attempt=$((attempt + 1))
          done
