# Example bot configuration
#
# Generate assets first: python3 generate-conversation-edge.py
#
# Usage:
#   bot --config config.yaml --users 5

transport: "websocket"
server_url: "wss://websocket.example.com"
meeting_id: "1"
conversation_dir: "conversation"
ramp_up_delay_ms: 500

# Set jwt_secret here or via JWT_SECRET env var
# jwt_secret: "your-base64-secret-here"
