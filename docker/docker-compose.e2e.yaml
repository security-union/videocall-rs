##
## E2E test stack — reuses the same dev Dockerfiles as CI.
## Starts the minimum services needed for Playwright E2E tests.
## dioxus-ui (port 3001).
##
## Usage:
##   docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml up -d
##   cd e2e && npx playwright test --project=dioxus
##   docker compose -p videocall-e2e -f docker/docker-compose.e2e.yaml down -v
##
## --project=dioxus selects the full 207-test suite. See playwright.config.ts
## for the bvt0/bvt1 smoke-subset projects.
##

services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_PASSWORD: "docker"
      PGPASSWORD: "docker"
      POSTGRES_DB: "actix-api-db"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "--http_port", "8222"]

  # Per-client downlink-impairment proxy (issue #1080). OFF by default: gated
  # behind the `impair` compose profile so normal e2e runs never start it and
  # the existing suite is not slowed. Bring it up with the profile:
  #   COMPOSE_PROFILES=impair docker compose -p videocall-e2e \
  #     -f docker/docker-compose.e2e.yaml up -d
  # (or `make e2e-up-impair`).
  #
  # WHY THIS EXISTS — the per-receiver-simulcast *divergence* test needs ONE
  # receiver's downlink degraded so its layer chooser steps DOWN while a healthy
  # co-receiver stays high. The chooser steps down on PACKET LOSS / PLI, not raw
  # throughput (videocall-client/src/decode/layer_chooser.rs::is_congested →
  # loss_per_sec >= LOSS_STEP_DOWN_PER_SEC || kf_per_sec >= PLI_STEP_DOWN_PER_SEC).
  #
  # MECHANISM (WS path, verified by code trace — see helpers/downlink-impair.ts):
  # the relay's WsChatSession holds a BOUNDED 128-slot outbound channel
  # (WS_OUTBOUND_CHANNEL_CAPACITY) drained straight to the TCP socket via
  # `ctx.binary` with NO app-level retransmit. Severely bandwidth-limiting ONE
  # receiver's WS TCP connection makes that receiver's kernel send buffer fill →
  # the drain stalls on TCP backpressure → the outbound channel fills →
  # `try_send` returns Full → VIDEO frames are shed (priority-drop policy,
  # videocall_outbound_channel_drops_total, issue #1057). A shed frame never
  # reaches that receiver, so the receive-side SequenceTracker sees a gap →
  # loss_per_sec rises → the chooser steps that receiver DOWN. The sender and
  # the healthy receiver have their own session actors + channels, so they are
  # untouched — exactly the per-receiver divergence the test asserts.
  #
  # toxiproxy listens on 8666 (published to the host so the browser dials it)
  # and upstreams to websocket-api:8080 inside the compose network. The 8474
  # HTTP control API lets a test add/adjust/remove a `bandwidth` toxic mid-run.
  # A test routes ONLY the degraded BrowserContext through it by overriding
  # `window.__APP_CONFIG.wsUrl` to `ws://localhost:8666` via an init script (see
  # helpers/downlink-impair.ts); the committed config.js is never touched.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    profiles: ["impair"]
    # Pre-create the `ws-downlink` proxy at boot so the control API is
    # immediately usable. `-host 0.0.0.0` binds the control API on all
    # interfaces so the host-side test can reach it on the published port.
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    volumes:
      - type: bind
        source: ./toxiproxy
        target: /config
        read_only: true
    ports:
      # toxiproxy HTTP control API (add/update/delete toxics at runtime).
      - "8474:8474"
      # The shaped WS listener the degraded browser dials instead of :8080.
      - "8666:8666"
    depends_on:
      - websocket-api

  meeting-api:
    build:
      dockerfile: docker/Dockerfile.actix.dev
      context: ../
    working_dir: /app/meeting-api
    command: >
      nix develop /app#backend-dev --command bash -c
      "/app/dbmate/startup.sh && cargo run --bin meeting-api"
    environment:
      - NIX_CONFIG=experimental-features = nix-command flakes
      - LISTEN_ADDR=0.0.0.0:8081
      - DATABASE_URL=postgres://postgres:docker@postgres:5432/actix-api-db?sslmode=disable
      - JWT_SECRET=dev-jwt-secret-change-me
      - TOKEN_TTL_SECS=3600
      - SESSION_TTL_SECS=315360000
      - COOKIE_SECURE=false
      - COOKIE_DOMAIN=
      - CORS_ALLOWED_ORIGIN=
      - OAUTH_CLIENT_ID=
      - OAUTH_SECRET=
      - OAUTH_REDIRECT_URL=
      - OAUTH_ISSUER=
      - OAUTH_AUTH_URL=
      - OAUTH_TOKEN_URL=
      - OAUTH_JWKS_URL=
      - OAUTH_USERINFO_URL=
      - AFTER_LOGIN_URL=http://localhost:3001
      - ALLOWED_REDIRECT_URLS=http://localhost:3001
      - NATS_URL=nats:4222
      # Bypass the per-user display-name rename rate limiter (5 renames per
      # 60s window) — the Playwright suite runs many tests under the same
      # `dev_user` identity, and shared parallel workers legitimately exceed
      # the production budget across one window. Without this bypass, every
      # `POST /api/v1/meetings/{id}/join` after the first ~5 fails with 429
      # (`RATE_LIMIT_EXCEEDED`) and the cascade times out downstream
      # `toBeVisible()` assertions. See issue #608.
      - DISPLAY_NAME_RATE_LIMIT_DISABLED=true
      - RUST_LOG=info
      - CARGO_TARGET_DIR=/app/meeting-api/target
      - CARGO_INCREMENTAL=1
    ports:
      - "8081:8081"
    volumes:
      - type: bind
        source: ../
        target: /app
      - nix-store-e2e-meeting-api:/nix
      - e2e-meeting-api-registry:/root/.cargo/registry
      - e2e-meeting-api-git:/root/.cargo/git
      - e2e-meeting-api-target:/app/meeting-api/target
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  websocket-api:
    build:
      dockerfile: docker/Dockerfile.actix.dev
      context: ../
    working_dir: /app/actix-api
    command: >
      nix develop /app#backend-dev --command bash -c
      "cargo run --bin websocket_server"
    environment:
      - NIX_CONFIG=experimental-features = nix-command flakes
      - ACTIX_PORT=8080
      - UI_ENDPOINT=http://localhost:3001
      - DATABASE_ENABLED=false
      - RUST_LOG=info
      - NATS_URL=nats:4222
      - REGION=us-east
      - SERVER_ID=server-1
      - SERVICE_TYPE=websocket
      - FEATURE_MEETING_MANAGEMENT=true
      - JWT_SECRET=dev-jwt-secret-change-me
      - CARGO_TARGET_DIR=/app/actix-api/target
      - CARGO_INCREMENTAL=1
      - LOGIN_URL=
      - ACTIX_UI_BACKEND_URL=
      - WEBTRANSPORT_HOST=
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ../
        target: /app
      - nix-store-e2e-websocket-api:/nix
      - e2e-websocket-api-registry:/root/.cargo/registry
      - e2e-websocket-api-git:/root/.cargo/git
      - e2e-websocket-api-target:/app/actix-api/target
    depends_on:
      - nats

  # WebTransport / QUIC media server. Required for the WT regression spec
  # `wt-persistent-streams-freeze-regression.spec.ts` (issue #777). The
  # wasm client at `dioxus-ui/src/context.rs::resolve_transport_config`
  # forces connections to `https://127.0.0.1:4433` when sticky
  # `vc_transport_preference=webtransport` is set in localStorage; without
  # this service in the e2e stack, the connection has nowhere to land and
  # the spec must be marked `test.fixme`. Mirrors the production
  # `webtransport-api` block in `docker-compose.yaml`.
  webtransport-api:
    build:
      dockerfile: docker/Dockerfile.actix.dev
      context: ../
    working_dir: /app/actix-api
    command: >
      nix develop /app#backend-dev --command bash -c
      "cargo run -r --bin webtransport_server"
    environment:
      - NIX_CONFIG=experimental-features = nix-command flakes
      - RUST_LOG=info
      - NATS_URL=nats:4222
      - REGION=us-east
      - SERVER_ID=server-1
      - SERVICE_TYPE=webtransport
      - LISTEN_URL=0.0.0.0:4433
      - HEALTH_LISTEN_URL=0.0.0.0:5321
      - CERT_PATH=certs/localhost.pem
      - KEY_PATH=certs/localhost.key
      - FEATURE_MEETING_MANAGEMENT=true
      - JWT_SECRET=dev-jwt-secret-change-me
      # Dev cert preflight: enforces that the on-disk dev cert is shaped how
      # Chromium's `serverCertificateHashes` API requires (ECDSA P-256,
      # <=14d validity, SAN includes 127.0.0.1 + localhost). If a developer
      # ends up with a stale or mismatched cert (e.g. legacy RSA, or one
      # regenerated >14 days ago), the server fails fast with a remediation
      # message instead of starting silently and breaking every QUIC
      # handshake at runtime. See actix-api/src/webtransport/cert_preflight.rs.
      - WT_DEV_CERT_PREFLIGHT=true
      - CARGO_TARGET_DIR=/app/actix-api/target
      - CARGO_INCREMENTAL=1
    ports:
      # UDP — WebTransport runs over HTTP/3 / QUIC. The Playwright Chrome
      # launch flags include `--origin-to-force-quic-on=127.0.0.1:4433`
      # (see e2e/playwright.config.ts) so the browser resolves the wasm
      # client's `https://127.0.0.1:4433` target to this UDP listener.
      - "4433:4433/udp"
      # TCP — health/metrics HTTP server bound by `webtransport_server` from
      # `HEALTH_LISTEN_URL` (see `actix-api/src/bin/webtransport_server.rs`).
      # Exposed so `e2e/helpers/wait-for-services.ts` can probe
      # `http://localhost:5321/healthz` before any spec runs. A UDP socket
      # has no portable "is it bound" readiness probe; the TCP health
      # endpoint is the supported signal that the WT server is up.
      - "5321:5321"
    volumes:
      - type: bind
        source: ../
        target: /app
      - nix-store-e2e-webtransport-api:/nix
      - e2e-webtransport-api-registry:/root/.cargo/registry
      - e2e-webtransport-api-git:/root/.cargo/git
      - e2e-webtransport-api-target:/app/actix-api/target
    depends_on:
      - nats

  dioxus-ui:
    build:
      dockerfile: docker/Dockerfile.dioxus.dev
      context: ../
    working_dir: /app/dioxus-ui
    command: >
      nix develop /app#frontend --command bash -c
      "/app/docker/start-dioxus.sh"
    environment:
      - NIX_CONFIG=experimental-features = nix-command flakes
      - ACTIX_UI_BACKEND_URL=ws://localhost:8080
      # WT host is published from the host (browser) perspective: the
      # webtransport-api service binds UDP 4433 on the host, and the
      # Playwright Chrome launch in playwright.config.ts forces QUIC on
      # 127.0.0.1:4433. Inside the dioxus-ui container this is only
      # baked into runtime config.js for the wasm client, not dialed
      # from the container itself.
      - WEBTRANSPORT_HOST=https://127.0.0.1:4433
      - TRUNK_SERVE_PORT=3001
      - ENABLE_OAUTH=false
      - API_BASE_URL=http://localhost:8081
      - LOGIN_URL=http://localhost:8081/login
      - RUSTFLAGS=--cfg=web_sys_unstable_apis
      # WT must be enabled in the wasm client so the
      # `vc_transport_preference=webtransport` localStorage flag (set by
      # the regression spec) actually elects WT instead of being clamped
      # back to WS. See issue #777.
      - WEBTRANSPORT_ENABLED=true
      - E2EE_ENABLED=false
      - FIREFOX_ENABLED=false
      # Enable the mock-peers debug feature so layout-driven specs (e.g.
      # decode-budget.spec.ts, issue #987 task 1a.6) can synthesize peer tiles
      # without spinning up N real browser contexts. This flag also gates the
      # test-only `window.__videocall_inject_render_fps` injection hook.
      - MOCK_PEERS_ENABLED=true
      # Build the wasm client with the `netsim` cargo feature (issue #1080).
      # The e2e UI is compiled at container startup by trunk (see
      # docker/start-dioxus.sh — `trunk build` in static mode / `trunk serve`
      # in dev mode), NOT at Docker image-build time. Trunk reads this env var
      # (TRUNK_BUILD_FEATURES, equivalent to `--features netsim`) and applies
      # it ONLY to the primary `rel="rust"` target in index.html — the
      # videocall-ui app binary, which has no per-link `data-cargo-features`.
      # The codecs/neteq worker targets set their own `data-cargo-features`
      # (+ data-cargo-no-default-features) so they are unaffected (verified via
      # `trunk build -v`: the codecs/neteq cargo invocations stay
      # `--no-default-features --features wasm|web`, only videocall-ui gains
      # `--features netsim`).
      #
      # WHY netsim is e2e-only and always-on here: it compiles in the
      # `window.__vcNetsim` per-client downlink-impairment shim (dioxus-ui
      # main.rs) used by the WT/WS simulcast-divergence spec to degrade ONE
      # receiver's downlink in-process. With no profile installed at runtime
      # the shim is a no-op fast path, so always-on for e2e keeps CI simple
      # and the standard suite unaffected. Production builds NEVER set this
      # env var (docker/docker-compose.yaml — the prod/dev stack — uses the
      # same Dockerfile.dioxus.dev + start-dioxus.sh but omits it), so prod
      # wasm stays byte-identical (the feature is fully compile-gated).
      - TRUNK_BUILD_FEATURES=netsim
      - USERS_ALLOWED_TO_STREAM=
      - DIOXUS_SERVE_MODE=${DIOXUS_SERVE_MODE:-dev}
      - CARGO_TARGET_DIR=/app/dioxus-ui/target
      - CARGO_INCREMENTAL=1
      - CARGO_NET_OFFLINE=false
      - OAUTH_PROVIDER=google
      - UI_URL=http://localhost:3001
    ports:
      - "3001:3001"
    volumes:
      - type: bind
        source: ../
        target: /app
      - nix-store-e2e-dioxus-ui:/nix
      - e2e-dioxus-ui-registry:/root/.cargo/registry
      - e2e-dioxus-ui-git:/root/.cargo/git
      - e2e-dioxus-ui-target:/app/dioxus-ui/target

volumes:
  nix-store-e2e-meeting-api:
  e2e-meeting-api-registry:
  e2e-meeting-api-git:
  e2e-meeting-api-target:
  nix-store-e2e-websocket-api:
  e2e-websocket-api-registry:
  e2e-websocket-api-git:
  e2e-websocket-api-target:
  nix-store-e2e-webtransport-api:
  e2e-webtransport-api-registry:
  e2e-webtransport-api-git:
  e2e-webtransport-api-target:
  nix-store-e2e-dioxus-ui:
  e2e-dioxus-ui-registry:
  e2e-dioxus-ui-git:
  e2e-dioxus-ui-target:
