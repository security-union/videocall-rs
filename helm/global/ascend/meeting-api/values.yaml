meeting-api:
  fullnameOverride: meeting-api-ascend
  nameOverride: meeting-api-ascend
  image:
    repository: hclcr.io/hcllabs/videocall-meeting-api
    tag: daily-2026-03-31-0954
  imagePullSecrets:
    - name: hclcr-pull-secret
  env:
    - name: RUST_LOG
      value: "warn,quinn=warn,web-transport-quinn=warn,async_nats=warn"
    - name: LISTEN_ADDR
      value: "0.0.0.0:8081"
    - name: PG_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: password
    - name: DATABASE_URL
      value: "postgres://postgres:$(PG_PASSWORD)@postgres-postgresql:5432/actix-api-db?sslmode=disable"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: jwt-secret
          key: secret
    - name: TOKEN_TTL_SECS
      value: "86400"
    - name: SESSION_TTL_SECS
      value: "315360000"
    - name: COOKIE_SECURE
      value: "true"
    - name: COOKIE_DOMAIN
      value: ".videocall.conceptcar7.com"
    - name: CORS_ALLOWED_ORIGIN
      value: "https://app.videocall.conceptcar7.com"
    - name: OAUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: google-oauth-credentials
          key: client-id
          optional: true
    - name: OAUTH_SECRET
      valueFrom:
        secretKeyRef:
          name: google-oauth-credentials
          key: client-secret
          optional: true
    - name: OAUTH_ISSUER
      value: "https://accounts.google.com"
    - name: OAUTH_REDIRECT_URL
      value: "https://api.videocall.conceptcar7.com/login/callback"
    - name: OAUTH_SCOPES
      value: "openid email profile"
    - name: AFTER_LOGIN_URL
      value: "https://app.videocall.conceptcar7.com"
    - name: ALLOWED_REDIRECT_URLS
      value: "https://app.videocall.conceptcar7.com"
    - name: SERVICE_VERSION_URLS
      value: "http://websocket-ascend:8080/version,http://webtransport-ascend:444/version,http://videocall-ui-ascend:80/version.json"
    - name: REGION
      value: "ascend"
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - host: api.videocall.conceptcar7.com
        paths:
          - path: /
            pathType: Prefix
            service:
              name: meeting-api-ascend
              port:
                number: 8081
