server:
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
    scrape_timeout: 10s

serverFiles:
  alert_rules.yml:
    groups:
      # =====================================================================
      # videocall_client_stability_alerts
      #
      # Issue #711 / Discussion #699: client heap growth and client-upstream
      # datagram drops were instrumented but not alerted on. These alerts
      # close that observability gap so the next #699-style cascade pages
      # on-call BEFORE audio dies, not after.
      # =====================================================================
      - name: videocall_client_stability_alerts
        rules:
          - alert: ClientHeapGrowthHigh
            expr: videocall_client_memory_used_bytes / on(meeting_id, session_id, peer_id, display_name) first_over_time(videocall_client_memory_used_bytes[5m]) > 2
            for: 60s
            labels:
              severity: critical
              page: "true"
            annotations:
              summary: "Client heap >2x preamble during active meeting"
              description: "{{ $labels.display_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) heap is {{ $value | printf \"%.2f\" }}x its first-seen value. Likely leak or unbounded buffer."

          - alert: ClientUpstreamDropsActive
            expr: deriv(videocall_datagram_drops_total[1m]) > 0
            for: 30s
            labels:
              severity: critical
              page: "true"
            annotations:
              summary: "Client dropping upstream datagrams"
              description: "{{ $labels.display_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) is dropping {{ $value | printf \"%.1f\" }} datagrams/sec on its upstream — receiver-side audio/video will degrade."

          - alert: RelayOutboundSaturating
            expr: sum by (transport, kind) (rate(videocall_outbound_channel_drops_total[1m])) > 5
            for: 30s
            labels:
              severity: critical
              page: "true"
            annotations:
              summary: "Relay outbound channel saturating ({{ $labels.transport }} {{ $labels.kind }})"
              description: "Relay is dropping {{ $value | printf \"%.1f\" }} {{ $labels.kind }} packets/sec on {{ $labels.transport }}. Check relay CPU, NATS publish latency, and per-room drops."
