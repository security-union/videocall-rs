# Grafana values for videocall monitoring (minimal resources)
grafana:
  # Image configuration
  image:
    tag: "10.0.0"
  
  # Minimal resources for cost optimization
  resources:
    limits:
      cpu: 100m
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 128Mi
  
  # Single replica
  replicas: 1
  
  # Persistence (minimal)
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: "do-block-storage"
  
  # Admin credentials from secret
  adminUser: ${GRAFANA_ADMIN_USER}
  adminPassword: ${GRAFANA_ADMIN_PASSWORD}
  
  # Service configuration
  service:
    type: ClusterIP
    port: 80
  
  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.videocall.rs
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.videocall.rs
  
  # Grafana configuration
  grafana.ini:
    server:
      domain: grafana.videocall.rs
      root_url: https://grafana.videocall.rs
    security:
      admin_user: ${GRAFANA_ADMIN_USER}
      admin_password: ${GRAFANA_ADMIN_PASSWORD}
    users:
      allow_sign_up: false
    auth.anonymous:
      enabled: false
  
  # Dashboard providers — tells Grafana which directories to scan for JSON files.
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "Videocall"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
        - name: kubernetes
          orgId: 1
          folder: "Kubernetes"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes

  # Datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-us-east-server:80
          access: proxy
          isDefault: true

  # Custom videocall dashboards — loaded from base chart ConfigMap
  # (file: references don't work in subchart context, so we use dashboardsConfigMaps)
  dashboardsConfigMaps:
    default: "videocall-dashboards"

  # Community K8s dashboards — downloaded from grafana.com by init container
  dashboards:
    kubernetes:
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 315
        revision: 3
        datasource: Prometheus
      kubernetes-deployments:
        gnetId: 8588
        revision: 1
        datasource: Prometheus
      kubernetes-pod-resources:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
  
  # Security context
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  
  # Pod security context
  podSecurityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472