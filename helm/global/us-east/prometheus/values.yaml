# Prometheus values for videocall monitoring
prometheus:
  server:
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 256Mi

    replicaCount: 1

    persistentVolume:
      enabled: true
      size: 8Gi
      storageClass: "do-block-storage"

    retention: "7d"

    service:
      type: ClusterIP
      servicePort: 80

    securityContext:
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534

    global:
      scrape_interval: 15s
      evaluation_interval: 15s

  alertmanager:
    enabled: false

  nodeExporter:
    enabled: true

  pushgateway:
    enabled: false

  kubeStateMetrics:
    enabled: true
    resources:
      limits:
        cpu: 50m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 32Mi

  serverFiles:
    prometheus.yml:
      rule_files:
        - "alert_rules.yml"

      scrape_configs:
        # Prometheus self-monitoring
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']

        # Client health metrics (NATS → metrics_server → Prometheus)
        - job_name: 'videocall-client-metrics'
          static_configs:
            - targets: ['client-metrics-api:9091']
          metrics_path: '/metrics'
          scrape_interval: 5s
          scrape_timeout: 4s

        # Server connection tracking (NATS → metrics_server_snapshot → Prometheus)
        - job_name: 'videocall-server-stats'
          static_configs:
            - targets: ['server-metrics-api:9092']
          metrics_path: '/metrics'
          scrape_interval: 5s
          scrape_timeout: 4s

        # Kubernetes API server (minimal — just request totals)
        - job_name: 'kubernetes-apiservers'
          kubernetes_sd_configs:
            - role: endpoints
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          relabel_configs:
            - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
              action: keep
              regex: default;kubernetes;https
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'apiserver_request_total|apiserver_request_duration_seconds_count|up'
              action: keep

        # Kubernetes nodes (kubelet — minimal)
        - job_name: 'kubernetes-nodes'
          kubernetes_sd_configs:
            - role: node
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/${1}/proxy/metrics
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'kubelet_running_pods|kubelet_node_name|up'
              action: keep

        # cAdvisor (container CPU/memory usage) — filtered to only what we need
        - job_name: 'kubernetes-nodes-cadvisor'
          kubernetes_sd_configs:
            - role: node
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_memory_usage_bytes|machine_memory_bytes|machine_cpu_cores'
              action: keep

        # Kubernetes service endpoints (kube-state-metrics, etc.)
        - job_name: 'kubernetes-service-endpoints'
          honor_labels: true
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
              action: drop
              regex: "true"
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
              action: replace
              regex: (https?)
              target_label: __scheme__
              replacement: $1
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
              action: replace
              regex: (.+)
              target_label: __metrics_path__
              replacement: $1
            - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
              action: replace
              regex: (.+?)(?::\d+)?;(\d+)
              target_label: __address__
              replacement: $1:$2
            - action: labelmap
              regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
              replacement: __param_$1
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_service_name]
              action: replace
              target_label: service
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'kube_pod_container_resource_limits|kube_pod_container_resource_requests|kube_pod_status_phase|kube_pod_info|kube_deployment_status_replicas.*|kube_node_status_condition|up'
              action: keep

        # Kubernetes pods (auto-discovers relay servers via prometheus.io annotations)
        - job_name: 'kubernetes-pods'
          honor_labels: true
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
              action: drop
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
              action: replace
              regex: (https?)
              target_label: __scheme__
              replacement: $1
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              regex: (.+)
              target_label: __metrics_path__
              replacement: $1
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
              action: replace
              regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
              target_label: __address__
              replacement: '[$2]:$1'
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
              action: replace
              regex: (\d+);((([0-9]+?)(\.|$)){4})
              target_label: __address__
              replacement: $2:$1
            - action: labelmap
              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
              replacement: __param_$1
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_phase]
              action: drop
              regex: Pending|Succeeded|Failed|Completed
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node

    alert_rules.yml:
      groups:
        - name: videocall_relay_alerts
          rules:
            - alert: RelayPacketDrops
              expr: rate(relay_packet_drops_total[1m]) > 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Relay server dropping packets"
                description: "{{ $labels.room }} on {{ $labels.transport }}: {{ $value | printf \"%.1f\" }} drops/sec (reason: {{ $labels.drop_reason }})"

            - alert: RelayNATSLatencyHigh
              expr: histogram_quantile(0.99, sum(rate(relay_nats_publish_latency_ms_bucket[1m])) by (le)) > 50
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: "NATS publish latency p99 > 50ms"
                description: "NATS publish p99 latency is {{ $value | printf \"%.1f\" }}ms"

            # RelayQueueNearFull is split per transport because the single
            # relay_outbound_queue_depth gauge carries an 8x-different max per
            # transport, so one scalar threshold cannot express "near full" for
            # both: WS max = WS_OUTBOUND_CHANNEL_CAPACITY (128); WT max = the SUM
            # of the unistream (WT_OUTBOUND_CHANNEL_CAPACITY_DEFAULT, 512) and
            # datagram (WT_DATAGRAM_CHANNEL_CAPACITY, 512) channels = 1024. The
            # gauge has only room+transport labels (no per-primitive label yet),
            # so the WT rule anchors on 410 (~80% of the 512 unistream queue),
            # not 80% of the 1024 sum: under congestion the reliable unistream
            # backs up first (it blocks on QUIC flow control) while the datagram
            # path drops rather than queues, so a ~410-deep unistream backlog —
            # the source of the freeze symptom — would otherwise hide under the
            # summed gauge whenever datagrams are near-empty. Exporting a
            # per-primitive depth label so the WT rule can target the unistream
            # queue directly is a source-side follow-up (issue #710).
            - alert: RelayQueueNearFullWS
              expr: relay_outbound_queue_depth{transport="websocket"} > 102
              for: 30s
              labels:
                severity: warning
              annotations:
                summary: "Relay WS outbound queue near capacity"
                description: "Room {{ $labels.room }} (websocket) queue depth: {{ $value }} of 128 (WS cap=128)"

            - alert: RelayQueueNearFullWT
              expr: relay_outbound_queue_depth{transport="webtransport"} > 410
              for: 30s
              labels:
                severity: warning
              annotations:
                summary: "Relay WT outbound queue near capacity"
                description: "Room {{ $labels.room }} (webtransport) queue depth: {{ $value }} (WT cap=1024: unistream 512 + datagram 512; alert anchors on the 512 unistream queue)"

            # =====================================================================
            # relay viewport alerts (#1437)
            #
            # These derive the camera-blackout signature from the
            # filtered-vs-forwarded ratio rather than from the
            # relay_viewport_set_size gauge. That gauge is per-room
            # LAST-WRITER-WINS across receivers and cannot distinguish a
            # legitimately idle room from a collapsed one. The ratio of the two
            # per-room counters is unambiguous: relay_viewport_filtered_total
            # (intentional off-screen VIDEO drops) and
            # relay_viewport_forwarded_total (VIDEO that passed the filter). A
            # room dropping VIDEO while forwarding ~none is a total blackout.
            # relay_viewport_nonvideo_at_drop_branch_total is the #1437 invariant
            # tripwire — it must ALWAYS be 0; any increase means the #988 is_video
            # guard regressed. All three metrics are scraped from the relay pods
            # via the kubernetes-pods prometheus.io/scrape annotation job above.
            # =====================================================================
            - alert: ViewportBlackout
              expr: rate(relay_viewport_filtered_total[5m]) > 0 and rate(relay_viewport_forwarded_total[5m]) < 0.1
              for: 5m
              labels:
                severity: critical
                component: relay-viewport
              annotations:
                summary: "Viewport blackout in room {{ $labels.room }}"
                description: "Room {{ $labels.room }} is dropping VIDEO via the viewport filter ({{ $value }}/s filtered) while forwarding effectively none — total camera blackout for the room (#988/#1437)."

            - alert: ViewportNonVideoInvariantBreach
              expr: increase(relay_viewport_nonvideo_at_drop_branch_total[5m]) > 0
              for: 1m
              labels:
                severity: critical
                component: relay-viewport-invariant
              annotations:
                summary: "Viewport non-VIDEO invariant breach in room {{ $labels.room }}"
                description: "A non-VIDEO packet reached the viewport drop branch in room {{ $labels.room }} — the #988 is_video guard regressed (#1437). This counter must ALWAYS be 0; observed increase {{ $value }}."

        - name: videocall_quality_alerts
          rules:
            - alert: MeetingQualityDegraded
              expr: avg by (meeting_id)(videocall_call_quality_score) < 50
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: "Meeting quality degraded"
                description: "Meeting {{ $labels.meeting_id }} avg quality: {{ $value | printf \"%.0f\" }}/100"

            - alert: LowAudioConnectivity
              expr: videocall_peer_can_listen < 0.5
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Peer cannot receive audio"
                description: "{{ $labels.reporter_name }} cannot hear {{ $labels.peer_name }}"

        - name: videocall_resource_alerts
          rules:
            - alert: ContainerCPUHigh
              expr: 100 * sum by (container)(rate(container_cpu_usage_seconds_total{namespace="videocall",container=~"rustlemania-.*|nats"}[2m])) / sum by (container)(kube_pod_container_resource_limits{namespace="videocall",resource="cpu"}) > 85
              for: 3m
              labels:
                severity: warning
              annotations:
                summary: "Container CPU > 85% of limit"
                description: "{{ $labels.container }} at {{ $value | printf \"%.0f\" }}% CPU"

            - alert: ContainerMemoryHigh
              expr: 100 * container_memory_working_set_bytes{namespace="videocall",container=~"rustlemania-.*|nats|prometheus-server"} / on(container,pod,namespace) kube_pod_container_resource_limits{namespace="videocall",resource="memory"} > 85
              for: 3m
              labels:
                severity: warning
              annotations:
                summary: "Container memory > 85% of limit"
                description: "{{ $labels.container }} at {{ $value | printf \"%.0f\" }}% memory"

        # =====================================================================
        # videocall_client_stability_alerts
        #
        # Issue #711 / Discussion #699: the 2026-05-11 incident cascade was
        # diagnosed only post-mortem because the early-warning signals
        # (client heap growth and client-upstream datagram drops) were
        # instrumented but not alerted on. These alerts close that gap.
        # =====================================================================
        - name: videocall_client_stability_alerts
          rules:
            # Client JS heap has at least doubled vs. its first-seen value in
            # the last 5 minutes. The cumulative gauge is per
            # (meeting_id, session_id, peer_id, display_name) so each line
            # is compared against its own meeting-preamble baseline.
            - alert: ClientHeapGrowthHigh
              expr: videocall_client_memory_used_bytes / on(meeting_id, session_id, peer_id, display_name) first_over_time(videocall_client_memory_used_bytes[5m]) > 2
              for: 60s
              labels:
                severity: critical
                page: "true"
              annotations:
                summary: "Client heap >2x preamble during active meeting"
                description: "{{ $labels.display_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) heap is {{ $value | printf \"%.2f\" }}x its first-seen value. Likely leak or unbounded buffer."

            # Any client is dropping its own outbound datagrams (writable stream
            # locked / backpressured). videocall_datagram_drops_total is a
            # cumulative gauge so we use deriv() to extract per-second rate.
            - alert: ClientUpstreamDropsActive
              expr: deriv(videocall_datagram_drops_total[1m]) > 0
              for: 30s
              labels:
                severity: critical
                page: "true"
              annotations:
                summary: "Client dropping upstream datagrams"
                description: "{{ $labels.display_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) is dropping {{ $value | printf \"%.1f\" }} datagrams/sec on its upstream — receiver-side audio/video will degrade."

            # Server-wide outbound channel saturating. This is the
            # protocol-wide counter (no session label by design — see
            # actix-api/src/metrics.rs OUTBOUND_CHANNEL_DROPS_TOTAL).
            # Use the relay_packet_drops_total per-room alert
            # (RelayPacketDrops, already present) for per-room attribution.
            - alert: RelayOutboundSaturating
              expr: sum by (transport, kind) (rate(videocall_outbound_channel_drops_total[1m])) > 5
              for: 30s
              labels:
                severity: critical
                page: "true"
              annotations:
                summary: "Relay outbound channel saturating ({{ $labels.transport }} {{ $labels.kind }})"
                description: "Relay is dropping {{ $value | printf \"%.1f\" }} {{ $labels.kind }} packets/sec on {{ $labels.transport }}. Check relay CPU, NATS publish latency, and per-room drops."

        # =====================================================================
        # videocall_playout_latency_alerts
        #
        # Issue #1252 / #1339: per-session buffered playout latency. The gauge
        # videocall_video_playout_latency_ms (PR #1337) measures how far behind
        # live a receiver's decoded video is (jitter-buffer backlog + decoder
        # queue). Sustained >1800ms is the #1252 audio-ahead-of-video lag.
        # Keyed on session_id; the gauge is reported only while the tile is
        # actively receiving (fps_received > 0), so a stale/idle tile reports 0
        # and never trips these alerts.
        # =====================================================================
        - name: videocall_playout_latency_alerts
          rules:
            # WARN band: 600ms <= latency < 1800ms. Strictly below 1800 so this
            # never fires concurrently with the critical alert on the same
            # series (critical owns > 1800). Sustained 600ms is the onset of
            # perceptible audio-ahead-of-video drift.
            - alert: VideoPlayoutLatencyElevated
              expr: videocall_video_playout_latency_ms >= 600 and videocall_video_playout_latency_ms < 1800
              for: 30s
              labels:
                severity: warning
                component: video-playout
              annotations:
                summary: "Video playout latency elevated (600-1800ms)"
                description: "{{ $labels.peer_name }} as seen by {{ $labels.reporter_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) is {{ $value | printf \"%.0f\" }}ms behind live. Approaching the #1252 lag threshold."

            # CRITICAL: latency > 1800ms sustained for > 10s. This is the #1252
            # lag: audio plays live while video is seconds behind.
            - alert: VideoPlayoutLatencyHigh
              expr: videocall_video_playout_latency_ms > 1800
              for: 10s
              labels:
                severity: critical
                component: video-playout
                page: "true"
              annotations:
                summary: "Video playout latency > 1800ms (#1252 lag)"
                description: "{{ $labels.peer_name }} as seen by {{ $labels.reporter_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) is {{ $value | printf \"%.0f\" }}ms behind live. Audio-ahead-of-video lag (#1252) — video is seconds behind."

            # AUDIO sibling. DEPENDS ON #1360 (videocall_audio_playout_latency_ms)
            # merging — this rule is inert until that gauge exists. The audio
            # playout buffer is governed by NetEQ, whose scale differs from the
            # video jitter buffer, so the 1800ms threshold is inherited from
            # video as a starting point and LIKELY NEEDS FIELD TUNING against
            # videocall_neteq_target_delay_ms before it is trusted to page.
            - alert: AudioPlayoutLatencyHigh
              expr: videocall_audio_playout_latency_ms > 1800
              for: 10s
              labels:
                severity: warning
                component: audio-playout
              annotations:
                summary: "Audio playout latency > 1800ms (threshold needs NetEQ tuning)"
                description: "{{ $labels.peer_name }} as seen by {{ $labels.reporter_name }} in meeting {{ $labels.meeting_id }} (session {{ $labels.session_id }}) audio is {{ $value | printf \"%.0f\" }}ms behind live. Threshold inherited from video and pending field tuning against NetEQ target delay (#1360)."
