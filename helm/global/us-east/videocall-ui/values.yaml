# US East Dioxus UI configuration
videocall-ui:
  fullnameOverride: "videocall-ui-us-east"

  replicaCount: 1

  image:
    repository: securityunion/videocall-dioxus-ui
    pullPolicy: Always
    tag: latest

  resources:
    limits:
      cpu: "100m"
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"

  nodeSelector:
    topology.kubernetes.io/region: "nyc1"

  runtimeConfig:
    apiBaseUrl: "https://api.videocall.rs"
    wsUrl: "wss://websocket-us-east.webtransport.video"
    webTransportHost: "https://webtransport-us-east.webtransport.video"
    oauthEnabled: "true"
    oauthProvider: "google"
    e2eeEnabled: "false"
    webTransportEnabled: "true"
    usersAllowedToStream: ""
    serverElectionPeriodMs: 2000
    audioBitrateKbps: 16
    videoBitrateKbps: 160
    screenBitrateKbps: 160

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: app.videocall.rs
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: videocall-ui-tls
        hosts:
          - app.videocall.rs
