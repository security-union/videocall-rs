# US East WebTransport server configuration
rustlemania-webtransport:
  nameOverride: "webtransport-us-east"
  fullnameOverride: "webtransport-us-east"

  replicaCount: 1

  command: ['webtransport_server']
  tlsSecret: webtransport-us-east-tls

  image:
    repository: securityunion/videocall-media-server
    pullPolicy: Always
    tag: latest

  env:
    - name: RUST_LOG
      value: warn,quinn=warn,web-transport-quinn=warn,async_nats=warn
    - name: NATS_URL
      value: nats-us-east:4222
    - name: LISTEN_URL
      value: 0.0.0.0:443
    - name: HEALTH_LISTEN_URL
      value: 0.0.0.0:444
    - name: CERT_PATH
      value: /certs/tls.crt
    - name: KEY_PATH
      value: /certs/tls.key
    - name: REGION
      value: "us-east"
    - name: HOSTNAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: SERVER_ID
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: SERVICE_TYPE
      value: webtransport
    - name: SERVER_STATS_INTERVAL_SECS
      value: "5"
    - name: TOKIO_WORKER_THREADS
      value: "4"
    - name: TOKIO_BLOCKING_THREADS
      value: "2"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: jwt-secret
          key: secret

  resources:
    limits:
      cpu: "3500m"
      memory: "6000Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  service:
    type: LoadBalancer
    port: 443
    healthPort: 444

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "444"
    prometheus.io/path: "/metrics"

  # LB annotations — must be under loadBalancerAnnotations (not service.annotations)
  # as that's what the loadbalancer.yaml template reads.
  loadBalancerAnnotations:
    external-dns.alpha.kubernetes.io/hostname: "webtransport-us-east.webtransport.video"
    service.beta.kubernetes.io/do-loadbalancer-type: "REGIONAL_NETWORK"
    service.beta.kubernetes.io/do-loadbalancer-size-unit: "1"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-protocol: "http"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-check-interval-seconds: "3"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-response-timeout-seconds: "4"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-unhealthy-threshold: "3"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-healthy-threshold: "5"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-port: "444"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-path: "/healthz"

  nodeSelector:
    topology.kubernetes.io/region: "nyc1"

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - webtransport-us-east
          topologyKey: kubernetes.io/hostname
