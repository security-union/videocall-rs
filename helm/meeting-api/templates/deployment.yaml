apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meeting-api.fullname" . }}
  labels:
    {{- include "meeting-api.labels" . | nindent 4 }}
spec:
  {{- if and .Values.consoleLogs.enabled (or (and .Values.autoscaling.enabled (gt (int .Values.autoscaling.maxReplicas) 1)) (and (not .Values.autoscaling.enabled) (gt (int .Values.replicaCount) 1))) }}
  {{- fail "consoleLogs.enabled is incompatible with multiple replicas (ReadWriteOnce PVC cannot be mounted by multiple pods)" }}
  {{- end }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if .Values.consoleLogs.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "meeting-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
        prometheus.io/scrape-interval: "15s"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "meeting-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "meeting-api.fullname" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
            {{- if .Values.consoleLogs.enabled }}
            - name: CONSOLE_LOG_UPLOAD_ENABLED
              value: "true"
            - name: CONSOLE_LOG_DIR
              value: "/data/console-logs"
            - name: CONSOLE_LOG_RETENTION_DAYS
              value: {{ .Values.consoleLogs.retentionDays | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.consoleLogs.enabled }}
          volumeMounts:
            - name: console-logs
              mountPath: /data/console-logs
          {{- end }}
      {{- if .Values.consoleLogs.enabled }}
      volumes:
        - name: console-logs
          persistentVolumeClaim:
            claimName: {{ include "meeting-api.fullname" . }}-console-logs
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
