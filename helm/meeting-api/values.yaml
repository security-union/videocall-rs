# Default values for meeting-api.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1
image:
  repository: securityunion/videocall-meeting-api
  pullPolicy: Always
  tag: latest
imagePullSecrets: []
env:
  - name: RUST_LOG
    value: info
  - name: LISTEN_ADDR
    value: "0.0.0.0:8081"
  - name: DATABASE_URL
    value: postgres://postgres:password@postgres-postgresql:5432/actix-api-db?sslmode=disable
  # JWT_SECRET must be provided via a Kubernetes secret.
  # Create with: kubectl create secret generic jwt-secret --from-literal=secret=<value>
  # The same secret must be deployed to the webtransport and websocket services.
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
  - name: TOKEN_TTL_SECS
    value: "86400"
  - name: SESSION_TTL_SECS
    value: "315360000"
  - name: COOKIE_SECURE
    value: "true"
  - name: COOKIE_DOMAIN
    value: ".videocall.rs"
  # Name of the session cookie (default: "session").
  - name: COOKIE_NAME
    value: "session"
  - name: CORS_ALLOWED_ORIGIN
    value: "https://app.videocall.rs"
  # --- OAuth / OIDC ---
  # Set OAUTH_ISSUER for OIDC discovery (auto-populates auth/token/jwks URLs).
  - name: OAUTH_ISSUER
    value: ""
  - name: OAUTH_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: oauth-credentials
        key: client-id
        optional: true
  - name: OAUTH_SECRET
    valueFrom:
      secretKeyRef:
        name: oauth-credentials
        key: client-secret
        optional: true
  - name: OAUTH_AUTH_URL
    value: ""
  - name: OAUTH_TOKEN_URL
    value: ""
  - name: OAUTH_JWKS_URL
    value: ""
  - name: OAUTH_USERINFO_URL
    value: ""
  - name: OAUTH_REDIRECT_URL
    value: "https://api.videocall.rs/login/callback"
  - name: OAUTH_SCOPES
    value: "openid email profile"
  - name: AFTER_LOGIN_URL
    value: "https://app.videocall.rs"
  - name: ALLOWED_REDIRECT_URLS
    value: "https://app.videocall.rs"
  - name: SERVICE_VERSION_URLS
    value: ""
resources:
  limits:
    cpu: "200m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 8081
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts: []
  tls: []
