# Default values for rustlemania-websocket.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1
image:
  repository: securityunion/videocall-media-server
  pullPolicy: Always
  tag: latest
imagePullSecrets: []
env:
  - name: RUST_LOG
    value: warn
  - name: ACTIX_PORT
    value: "8080"
  - name: NATS_URL
    value: nats:4222
  - name: REGION
    value: "default"
  - name: HOSTNAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVER_ID
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVICE_TYPE
    value: websocket
  - name: SERVER_STATS_INTERVAL_SECS
    value: "5"
  - name: TOKIO_WORKER_THREADS
    value: "2"
  # JWT_SECRET must match the secret used by meeting-api to sign room access tokens.
  # Create the secret with: kubectl create secret generic jwt-secret --from-literal=secret=<value>
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "32Mi"
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 8080
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []
