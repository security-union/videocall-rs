# Default values for rustlemania-webtransport.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1
image:
  repository: securityunion/videocall-media-server
  pullPolicy: Always
  tag: latest
imagePullSecrets: []
command: ['webtransport_server']
args: []
tlsSecret: webtransport-tls
env:
  - name: RUST_LOG
    value: warn,quinn=warn
  - name: NATS_URL
    value: nats:4222
  - name: LISTEN_URL
    value: 0.0.0.0:443
  - name: HEALTH_LISTEN_URL
    value: 0.0.0.0:444
  - name: CERT_PATH
    value: /certs/tls.crt
  - name: KEY_PATH
    value: /certs/tls.key
  - name: REGION
    value: "default"
  - name: HOSTNAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVER_ID
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVICE_TYPE
    value: webtransport
  - name: SERVER_STATS_INTERVAL_SECS
    value: "5"
  - name: TOKIO_WORKER_THREADS
    value: "2"
  - name: TOKIO_BLOCKING_THREADS
    value: "2"
  # JWT_SECRET must match the secret used by meeting-api to sign room access tokens.
  # Create the secret with: kubectl create secret generic jwt-secret --from-literal=secret=<value>
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "32Mi"
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: NodePort
  port: 443
  healthPort: 444
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
loadBalancerAnnotations: {}
