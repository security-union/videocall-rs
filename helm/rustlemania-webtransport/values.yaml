# Default values for rustlemania-webtransport.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1
image:
  repository: securityunion/videocall-media-server
  pullPolicy: Always
  tag: latest
imagePullSecrets: []
command: ['webtransport_server']
args: []
tlsSecret: webtransport-tls
env:
  - name: RUST_LOG
    value: warn,quinn=warn
  - name: NATS_URL
    value: nats:4222
  - name: LISTEN_URL
    value: 0.0.0.0:443
  - name: HEALTH_LISTEN_URL
    value: 0.0.0.0:444
  - name: CERT_PATH
    value: /certs/tls.crt
  - name: KEY_PATH
    value: /certs/tls.key
  - name: REGION
    value: "default"
  - name: HOSTNAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVER_ID
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVICE_TYPE
    value: webtransport
  - name: SERVER_STATS_INTERVAL_SECS
    value: "5"
  # Bumped from 2 to 4: 2 worker threads serialised ~30 sessions in
  # the 17-peer cc7tp meeting on 2026-05-06, contributing to outbound
  # channel back-pressure. 4 threads matches the new 1500m CPU limit.
  - name: TOKIO_WORKER_THREADS
    value: "4"
  - name: TOKIO_BLOCKING_THREADS
    value: "2"
  # WT outbound mpsc capacity per session. Default in code is 1024 (up
  # from 256 to absorb 17-peer fan-out bursts). Override here only for
  # exceptionally large meetings.
  # - name: WT_OUTBOUND_CHANNEL_CAPACITY
  #   value: "2048"
  # JWT_SECRET must match the secret used by meeting-api to sign room access tokens.
  # Create the secret with: kubectl create secret generic jwt-secret --from-literal=secret=<value>
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
resources:
  # Bumped from 500m / 256Mi: a 17-peer cc7tp meeting on 2026-05-06
  # peaked at 0.47 CPU against the 0.5 limit and saw the outbound mpsc
  # queue overflow ~38.5k times. 1500m gives ~3x headroom for 17-peer
  # meetings, 1Gi tolerates the larger 1024-slot queue plus per-session
  # buffers under burst.
  limits:
    cpu: "1500m"
    memory: "1Gi"
  requests:
    cpu: "100m"
    memory: "32Mi"
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "444"
  prometheus.io/path: "/metrics"
podSecurityContext: {}
securityContext: {}
service:
  type: NodePort
  port: 443
  healthPort: 444
autoscaling:
  # Enabled to spread large meetings across multiple WT pods. Keeping
  # at least 2 replicas avoids a single-pod brown-out during pod
  # rollover, and the 70% CPU target gives roughly 1.4x headroom over
  # the steady-state load observed in a 17-peer meeting.
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
# Soft anti-affinity so the replicas of a single 30-person meeting do
# not all land on the same node. `preferred` (not `required`) so a
# small cluster with fewer nodes than replicas still schedules.
#
# The selector value matches the chart's `app.kubernetes.io/name`
# label as defined in `_helpers.tpl` -> `rustlemania.selectorLabels`,
# which defaults to the chart name `rustlemania-webtransport`.
# Override `nameOverride` in values to match if you change the chart.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - rustlemania-webtransport
          topologyKey: kubernetes.io/hostname
loadBalancerAnnotations: {}
