# Default values for rustlemania-webtransport.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1
image:
  repository: securityunion/videocall-media-server
  pullPolicy: Always
  tag: latest
imagePullSecrets: []
command: ['webtransport_server']
args: []
tlsSecret: webtransport-tls
env:
  - name: RUST_LOG
    value: warn,quinn=warn
  - name: NATS_URL
    value: nats:4222
  - name: LISTEN_URL
    value: 0.0.0.0:443
  - name: HEALTH_LISTEN_URL
    value: 0.0.0.0:444
  - name: CERT_PATH
    value: /certs/tls.crt
  - name: KEY_PATH
    value: /certs/tls.key
  - name: REGION
    value: "default"
  - name: HOSTNAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVER_ID
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: SERVICE_TYPE
    value: webtransport
  - name: SERVER_STATS_INTERVAL_SECS
    value: "5"
  # NOTE: TOKIO_WORKER_THREADS is intentionally NOT set for this relay.
  # The webtransport_server binary is `#[actix_rt::main]`, which builds a
  # single-threaded current-thread tokio runtime that never reads
  # TOKIO_WORKER_THREADS / worker_threads. The runtime is single-threaded
  # *by necessity*: the per-session `WtChatSession` actor and its
  # WebTransport I/O are driven on the actix LocalSet via spawn_local
  # (see actix-api/src/webtransport/mod.rs and the actor's `!Send` I/O),
  # which a multi-threaded runtime cannot host. Setting the env here was
  # therefore inert — a prior bump 2->4 (believed to relieve outbound
  # back-pressure in the 17-peer cc7tp meeting on 2026-05-06) did nothing,
  # because thread count cannot relieve back-pressure on a current-thread
  # runtime. The real multi-core fix (multi-Arbiter sharding / off-thread
  # parse — issue #1639 options a/b) is deferred to after the #1637
  # scheduler-lag instrumentation lands. The inert env was removed in #1639
  # (option c). TOKIO_BLOCKING_THREADS below still applies: the
  # current-thread runtime keeps a blocking-task pool for spawn_blocking.
  - name: TOKIO_BLOCKING_THREADS
    value: "2"
  # WT outbound mpsc capacity per session. Default in code is 512
  # (fail-fast per issue #979: a deep queue only buffers stale, useless
  # video for slow receivers — the priority-drop policy + CONGESTION
  # feedback are the correct response, not a bigger buffer). Override
  # here only for exceptional workloads.
  #
  # Shedding is NOT env-tunable: the priority-drop policy lives in
  # actix-api/src/actors/priority_drop.rs and uses fixed fill ratios
  # (video/screen shed at 0.80, audio at 0.95, control/critical never
  # preempted). There is no WT_OUTBOUND_SHEDDING_THRESHOLD env var — the
  # old dead var was removed in #731.
  # - name: WT_OUTBOUND_CHANNEL_CAPACITY
  #   value: "1024"
  # JWT_SECRET must match the secret used by meeting-api to sign room access tokens.
  # Create the secret with: kubectl create secret generic jwt-secret --from-literal=secret=<value>
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
resources:
  # Bumped from 500m / 256Mi: a 17-peer cc7tp meeting on 2026-05-06
  # peaked at 0.47 CPU against the 0.5 limit and saw the outbound mpsc
  # queue overflow ~38.5k times. 1500m gives ~3x headroom for 17-peer
  # meetings; the observed 7d memory peak was 60 MiB, so 512Mi keeps
  # ample headroom for the 512-slot per-session queue (each slot is a
  # `WtOutbound` enum holding at most one ~1200-byte datagram or a
  # bounded stream message, so worst-case per-session queue <1 MiB and
  # the dominant memory line item remains the codec/session state, not
  # the queue) while keeping the customer-facing default right-sized
  # rather than over-inflated.
  limits:
    cpu: "1500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "32Mi"
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "444"
  prometheus.io/path: "/metrics"
podSecurityContext: {}
securityContext: {}
service:
  type: NodePort
  port: 443
  healthPort: 444
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
# Soft anti-affinity so the replicas of a single 30-person meeting do
# not all land on the same node. `preferred` (not `required`) so a
# small cluster with fewer nodes than replicas still schedules.
#
# The selector value matches the chart's `app.kubernetes.io/name`
# label as defined in `_helpers.tpl` -> `rustlemania.selectorLabels`,
# which defaults to the chart name `rustlemania-webtransport`.
# Override `nameOverride` in values to match if you change the chart.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - rustlemania-webtransport
          topologyKey: kubernetes.io/hostname
loadBalancerAnnotations: {}
