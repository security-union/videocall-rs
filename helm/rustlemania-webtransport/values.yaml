# Default values for rustlemania.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1
image:
  repository: securityunion/videocall-media-server
  pullPolicy: Always
  tag: high-availability-cf63fcce
command: ['webtransport_server']
args: []
tlsSecret: rustlemania-ui-tls
env:
  - name: RUST_LOG
    value: debug,quinn=warn
  - name: NATS_URL
    value: nats:4222
  - name: LISTEN_URL
    value: 0.0.0.0:443
  - name: HEALTH_LISTEN_URL
    value: 0.0.0.0:444
  - name: CERT_PATH
    value: /certs/tls.crt
  - name: KEY_PATH
    value: /certs/tls.key
  - name: TOKIO_WORKER_THREADS
    value: "1"  # Default for WebTransport services - adjust per region as needed
  - name: TOKIO_BLOCKING_THREADS
    value: "2"  # Small pool for blocking crypto operations
  # JWT_SECRET must match the secret used by meeting-api to sign room access tokens.
  # Create the secret with: kubectl create secret generic jwt-secret --from-literal=secret=<value>
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
resources:
  limits:
    cpu: "1000m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "32Mi"
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "444"
  prometheus.io/path: "/metrics"
podSecurityContext: {}
securityContext: {}
service:
  type: NodePort
  port: 443
  healthPort: 444
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
# Used to configure cloud provider specific LB service type
loadBalancerAnnotations:
  external-dns.alpha.kubernetes.io/hostname: "transport.rustlemania.com"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-protocol: "http"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-check-interval-seconds: "3"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-response-timeout-seconds: "4"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-unhealthy-threshold: "3"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-healthy-threshold: "5"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-port: "444"
  service.beta.kubernetes.io/do-loadbalancer-size-unit: "1"
  service.beta.kubernetes.io/do-loadbalancer-healthcheck-path: "/healthz"
