nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: securityunion/videocall-dioxus-ui
  pullPolicy: Always
  tag: latest

resources:
  limits:
    cpu: "50m"
    memory: "10Mi"
  requests:
    cpu: "20m"
    memory: "10Mi"

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

runtimeConfig:
  apiBaseUrl: "https://app.videocall.rs"
  wsUrl: "wss://websocket-singapore.webtransport.video,wss://websocket-us-east.webtransport.video"
  webTransportHost: "https://webtransport-singapore.webtransport.video,https://webtransport-us-east.webtransport.video"
  oauthEnabled: "false"
  oauthProvider: ""              # "google", "okta", or ""
  oauthFlow: ""                  # "pkce" for client-side PKCE, "" for server-side OAuth
  oauthPrompt: ""                # "login", "consent", "select_account", or "" to omit
  e2eeEnabled: "false"
  webTransportEnabled: "true"
  firefoxEnabled: "false"
  usersAllowedToStream: ""
  serverElectionPeriodMs: 2000
  audioBitrateKbps: 65
  videoBitrateKbps: 1000
  screenBitrateKbps: 1000
  vadThreshold: 0.02
  consoleLogUploadEnabled: "false"
  imageTag: "latest"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: app.videocall.rs
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: videocall-ui-tls
      hosts:
        - app.videocall.rs
