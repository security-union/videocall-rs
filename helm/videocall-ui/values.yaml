nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: securityunion/videocall-dioxus-ui
  pullPolicy: Always
  tag: latest

imagePullSecrets: []

resources:
  limits:
    cpu: "200m"
    memory: "128Mi"
  requests:
    cpu: "50m"
    memory: "64Mi"

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

runtimeConfig:
  apiBaseUrl: "https://app.videocall.rs"
  wsUrl: "wss://websocket-singapore.webtransport.video,wss://websocket-us-east.webtransport.video"
  webTransportHost: "https://webtransport-singapore.webtransport.video,https://webtransport-us-east.webtransport.video"
  oauthEnabled: "false"
  oauthProvider: ""              # "google", "okta", or ""
  oauthFlow: ""                  # "pkce" for client-side PKCE, "" for server-side OAuth
  oauthPrompt: ""                # "login", "consent", "select_account", or "" to omit
  e2eeEnabled: "false"
  webTransportEnabled: "true"
  transportBadgeEnabled: "false"
  # Issue #1480: gate git commit SHA + branch in About modal / diagnostics
  # build-info. FAIL-CLOSED: "false" (or omitting the key) HIDES git info, so
  # production never leaks commit/branch. Dev/e2e (dioxus-ui/scripts/config.js)
  # sets "true".
  showBuildGitInfo: "false"
  firefoxEnabled: "false"
  usersAllowedToStream: ""
  serverElectionPeriodMs: 2000
  audioBitrateKbps: 65
  videoBitrateKbps: 1000
  screenBitrateKbps: 1000
  vadThreshold: 0.02
  consoleLogUploadEnabled: "false"
  # Independent operator control for client hardware/network/battery telemetry.
  hardwareMetricsEnabled: "true"
  imageTag: "latest"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: app.videocall.rs
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: videocall-ui-tls
      hosts:
        - app.videocall.rs
