syntax = "proto3";

package health_packet;

message NetEqOperationCounters {
  double normal_per_sec = 1;
  double expand_per_sec = 2;
  double accelerate_per_sec = 3;
  double fast_accelerate_per_sec = 4;
  double preemptive_expand_per_sec = 5;
  double merge_per_sec = 6;
  double comfort_noise_per_sec = 7;
  double dtmf_per_sec = 8;
  double undefined_per_sec = 9;
}

message NetEqNetwork {
  NetEqOperationCounters operation_counters = 1;
}

message NetEqStats {
  double current_buffer_size_ms = 1;
  double packets_awaiting_decode = 2;
  NetEqNetwork network = 3;
  // Number of audio packets received per second (rolling 1s window)
  double packets_per_sec = 4;
  // Delay manager target delay — the algorithm's estimate of how much buffering is
  // needed to absorb observed network jitter. This IS the network jitter metric;
  // < 30ms = excellent, < 75ms = acceptable, >= 75ms = degraded.
  double target_delay_ms = 5;
}

message VideoStats {
  double fps_received = 1;
  double frames_buffered = 2;
  uint64 frames_decoded = 3;
  uint64 bitrate_kbps = 4;
}

message PeerStats {
  // Receiver-observed connectivity booleans
  bool can_listen = 1;
  bool can_see = 2;

  // Receiver-observed sender state flags (from peer_status)
  bool audio_enabled = 3; // true if receiver reports sender audio enabled
  bool video_enabled = 4; // true if receiver reports sender video enabled

  // Structured stats
  NetEqStats neteq_stats = 5;
  VideoStats video_stats = 6;

  // Phase 1 metrics: Quality indicators (FIXED: use windowed rates)
  double frames_dropped_per_sec = 7; // Decode errors per second (codec failures: keyframe miss, parse error, decoder reset). NOT CPU-pressure drops.
  double audio_packet_loss_pct = 8; // Audio packet loss percentage (0.0-100.0)
  optional double avg_decode_latency_ms = 9; // Average decode latency in ms

  // Computed quality scores (0-100). Absent when the stream is inactive.
  // 100 = perfect, 0 = completely broken.
  optional double audio_quality_score = 10; // Audio quality; absent when no audio flowing
  optional double video_quality_score = 11; // Video quality; absent when video disabled
  optional double call_quality_score  = 12; // min(audio, video) — primary alerting metric

  // P1: Cumulative decoder error count (codec failures: keyframe miss, parse error, decoder reset)
  optional uint64 decoder_errors_total = 13;
}

message HealthPacket {
  string session_id = 1;
  string meeting_id = 2;
  bytes reporting_user_id = 3;
  uint64 timestamp_ms = 4;

  // Sender self-reported state (authoritative)
  bool reporting_audio_enabled = 5;
  bool reporting_video_enabled = 6;

  // Per-peer stats keyed by peer_id (to_peer)
  map<string, PeerStats> peer_stats = 7;

  // Active connection info (client-side measured)
  string active_server_url = 8;
  string active_server_type = 9; // "webtransport" | "websocket"
  double active_server_rtt_ms = 10;

  // Phase 1 metrics: Browser state and resource usage
  bool is_tab_visible = 11; // Tab visibility state (true = visible/active)
  optional uint64 memory_used_bytes = 12; // JS heap memory used (Chrome only)
  optional uint64 memory_total_bytes = 13; // JS heap memory limit (Chrome only)
  optional double avg_encode_latency_ms = 14; // Average encode latency in ms
  bool is_tab_throttled = 15; // Browser tab throttling state
  optional uint64 send_queue_bytes = 16; // Bytes queued in send buffer
  optional double packets_received_per_sec = 17; // Inbound packet rate
  optional double packets_sent_per_sec = 18; // Outbound packet rate
  // Display name as entered by the user in the UI (e.g. "Jay at work").
  // Included in every health packet so observers (vcprobe, metrics_server)
  // can learn display names without depending on one-shot PARTICIPANT_JOINED events.
  optional string display_name = 19;

  // Receiver-side metrics: adaptive quality and transport health
  optional uint32 adaptive_video_tier = 20; // Current video encoding tier index (0=best, 7=minimal)
  optional uint32 adaptive_audio_tier = 21; // Current audio encoding tier index (0=high, 3=emergency)
  optional uint64 datagram_drops_total = 22; // Cumulative datagrams dropped (writable locked)
  optional uint64 keyframe_requests_sent_total = 23; // Cumulative keyframe requests sent (PLI)
  optional uint64 websocket_drops_total = 24; // Cumulative WebSocket packets dropped (backpressure)

  // Encoder decision inputs (P0: exposes the adaptive quality controller's reasoning)
  optional double encoder_fps_ratio = 25;          // Ratio of received FPS to target FPS driving tier decisions
  optional double encoder_worst_peer_fps = 26;     // FPS from the worst-performing receiver
  optional uint32 adaptive_screen_tier = 27;       // Screen share quality tier index (0=high, 1=medium, 2=low)
  optional bool screen_sharing_active = 28;        // Whether screen share is currently active

  // Encoder outputs (P1: completes the encoder decision chain)
  optional uint32 encoder_output_fps = 29;         // Actual frames/sec the camera encoder is producing
  optional double encoder_target_bitrate_kbps = 30; // PID controller computed target bitrate in kbps
  optional double encoder_bitrate_ratio = 31;      // Ratio of current bitrate to ideal bitrate for tier
}

