syntax = "proto3";

package health_packet;

message NetEqOperationCounters {
  double normal_per_sec = 1;
  double expand_per_sec = 2;
  double accelerate_per_sec = 3;
  double fast_accelerate_per_sec = 4;
  double preemptive_expand_per_sec = 5;
  double merge_per_sec = 6;
  double comfort_noise_per_sec = 7;
  double dtmf_per_sec = 8;
  double undefined_per_sec = 9;
}

message NetEqNetwork {
  NetEqOperationCounters operation_counters = 1;
}

message NetEqStats {
  double current_buffer_size_ms = 1;
  double packets_awaiting_decode = 2;
  NetEqNetwork network = 3;
  // Number of audio packets received per second (rolling 1s window)
  double packets_per_sec = 4;
  // Delay manager target delay — the algorithm's estimate of how much buffering is
  // needed to absorb observed network jitter. This IS the network jitter metric;
  // < 30ms = excellent, < 75ms = acceptable, >= 75ms = degraded.
  double target_delay_ms = 5;
}

message VideoStats {
  double fps_received = 1;
  double frames_buffered = 2;
  uint64 frames_decoded = 3;
  uint64 bitrate_kbps = 4;
}

message PeerStats {
  // Receiver-observed connectivity booleans
  bool can_listen = 1;
  bool can_see = 2;

  // Receiver-observed sender state flags (from peer_status)
  bool audio_enabled = 3; // true if receiver reports sender audio enabled
  bool video_enabled = 4; // true if receiver reports sender video enabled

  // Structured stats
  NetEqStats neteq_stats = 5;
  VideoStats video_stats = 6;

  // Phase 1 metrics: Quality indicators (FIXED: use windowed rates)
  double frames_dropped_per_sec = 7; // Decode errors per second (codec failures: keyframe miss, parse error, decoder reset). NOT CPU-pressure drops.
  // Renamed from audio_packet_loss_pct in PR #318.
  double audio_concealment_pct = 8; // Audio concealment percentage from NetEQ expand events (0.0-100.0)
  optional double avg_decode_latency_ms = 9; // Average decode latency in ms

  // Computed quality scores (0-100). Absent when the stream is inactive.
  // 100 = perfect, 0 = completely broken.
  optional double audio_quality_score = 10; // Audio quality; absent when no audio flowing
  optional double video_quality_score = 11; // Video quality; absent when video disabled
  optional double call_quality_score  = 12; // min(audio, video) — primary alerting metric

  // P1: Cumulative decoder error count (codec failures: keyframe miss, parse error, decoder reset)
  optional uint64 decoder_errors_total = 13;

  // Screen share video stats (separate from camera video_stats field 6)
  VideoStats screen_video_stats = 14;

  // Freeze-detection metrics (issue #1013). videocall_video_fps counts decode
  // calls, not visually distinct frames, so it reads ~30fps while video is
  // frozen. These surface the loss signal that actually proves a freeze.
  // Per-peer sequence loss rate (lost packets/sec, windowed) observed for this
  // peer's video stream. Sustained loss => frozen/glitched video even when
  // fps_received looks healthy.
  optional double video_seq_loss_per_sec = 15;
  // Per-peer keyframe (PLI) requests/sec this client sent TO this peer
  // (windowed). A sustained nonzero rate is the direct symptom of a stream
  // that cannot recover — feeds video_quality_score so it can't read 100/100
  // during a keyframe storm.
  optional double keyframe_requests_per_sec = 16;
}

message HealthPacket {
  string session_id = 1;
  string meeting_id = 2;
  bytes reporting_user_id = 3;
  uint64 timestamp_ms = 4;

  // Sender self-reported state (authoritative)
  bool reporting_audio_enabled = 5;
  bool reporting_video_enabled = 6;

  // Per-peer stats keyed by peer_id (to_peer)
  map<string, PeerStats> peer_stats = 7;

  // Active connection info (client-side measured)
  string active_server_url = 8;
  string active_server_type = 9; // "webtransport" | "websocket"
  double active_server_rtt_ms = 10;

  // Phase 1 metrics: Browser state and resource usage
  bool is_tab_visible = 11; // Tab visibility state (true = visible/active)
  optional uint64 memory_used_bytes = 12; // JS heap memory used (Chrome only)
  optional uint64 memory_total_bytes = 13; // JS heap memory limit (Chrome only)
  optional double avg_encode_latency_ms = 14; // Average encode latency in ms
  bool is_tab_throttled = 15; // Browser tab throttling state
  optional uint64 send_queue_bytes = 16; // Bytes queued in send buffer
  optional double packets_received_per_sec = 17; // Inbound packet rate
  optional double packets_sent_per_sec = 18; // Outbound packet rate
  // Display name as entered by the user in the UI (e.g. "Jay at work").
  // Included in every health packet so observers (vcprobe, metrics_server)
  // can learn display names without depending on one-shot PARTICIPANT_JOINED events.
  optional string display_name = 19;

  // Receiver-side metrics: adaptive quality and transport health
  optional uint32 adaptive_video_tier = 20; // Current video encoding tier index (0=best, 7=minimal)
  optional uint32 adaptive_audio_tier = 21; // Current audio encoding tier index (0=high, 3=emergency)
  optional uint64 datagram_drops_total = 22; // Cumulative datagrams dropped (writable locked)
  optional uint64 keyframe_requests_sent_total = 23; // Cumulative keyframe requests sent (PLI)
  optional uint64 websocket_drops_total = 24; // Cumulative WebSocket packets dropped (backpressure)

  // Encoder decision inputs (P0: exposes the adaptive quality controller's reasoning)
  optional double encoder_fps_ratio = 25;          // Ratio of received FPS to target FPS driving tier decisions
  reserved 26;                                     // Was: encoder_worst_peer_fps. Replaced by encoder_p75_peer_fps (field 67) in PR #658; legacy emitters/readers removed in #366.
  reserved "encoder_worst_peer_fps";
  optional uint32 adaptive_screen_tier = 27;       // Screen share quality tier index (0=high, 1=medium, 2=low)
  optional bool screen_sharing_active = 28;        // Whether screen share is currently active

  // Encoder outputs (P1: completes the encoder decision chain)
  optional uint32 encoder_output_fps = 29;         // Actual frames/sec the camera encoder is producing
  optional double encoder_target_bitrate_kbps = 30; // PID controller computed target bitrate in kbps
  optional double encoder_bitrate_ratio = 31;      // Ratio of current bitrate to ideal bitrate for tier

  // P2: Tier transition events since last health packet
  repeated TierTransition tier_transitions = 32;

  // Field numbers 33-36 reserved for future join-time network probe.
  reserved 33, 34, 35, 36;
  reserved "join_bandwidth_kbps", "join_rtt_ms", "join_jitter_ms", "join_packet_loss_pct";

  // Climb-rate limiter telemetry (PR-H)
  optional bool crash_ceiling_active = 37;           // Whether crash ceiling is currently armed
  optional uint32 crash_ceiling_tier_index = 38;     // Tier index of the ceiling (only set when active)
  optional double crash_ceiling_decay_ms = 39;       // Current decay period in ms
  optional uint64 step_up_blocked_ceiling = 40;      // Cumulative blocks by crash ceiling
  optional uint64 step_up_blocked_slowdown = 41;     // Cumulative blocks by recovery slowdown
  optional uint64 step_up_blocked_screen_share = 42; // Cumulative blocks by screen share ceiling
  repeated TierDwell tier_dwells = 43;               // Tier dwell samples since last packet

  // Encoder error counters (cumulative, since page load).
  // Server derives per-second rates via Prometheus rate().
  optional uint64 camera_encoder_errors_closed_codec = 44;
  optional uint64 camera_encoder_errors_vpx_mem_alloc = 45;
  optional uint64 camera_encoder_errors_configure_fatal = 46;
  optional uint64 camera_encoder_errors_generic = 47;
  optional uint64 camera_encoder_frames_submitted_ok = 48;
  optional uint64 screen_encoder_errors_closed_codec = 49;
  optional uint64 screen_encoder_errors_vpx_mem_alloc = 50;
  optional uint64 screen_encoder_errors_configure_fatal = 51;
  optional uint64 screen_encoder_errors_generic = 52;
  optional uint64 screen_encoder_frames_submitted_ok = 53;

  // Connection-loss reason counters (cumulative since process start)
  optional uint64 connection_handshake_failures_total = 54;
  optional uint64 connection_session_drops_total = 55;

  // TELEM-7: Static client metadata (re-sent every packet for late-joining observers)
  optional uint32 client_cores = 56;                    // navigator.hardwareConcurrency
  optional string client_architecture = 57;             // "x86" | "arm" | ""
  optional string client_gpu_family = 58;               // Normalized GPU family name
  optional string client_network_effective_type = 59;   // "4g" | "3g" | "2g" | "slow-2g"
  optional double client_network_downlink = 60;         // Mbps from navigator.connection
  optional uint32 client_network_rtt = 61;              // ms from navigator.connection
  optional bool client_battery_charging = 62;           // Battery API charging state
  optional double client_battery_level = 63;            // Battery API level 0.0-1.0
  optional uint32 client_capability_score = 64;         // TELEM-6 benchmark iteration count

  // TELEM-8: Long task durations accumulated since last health packet (ms)
  repeated double longtask_durations_ms = 65;

  // TELEM-9: Main-thread rAF cadence (frames per second)
  optional double render_fps = 66;

  // Compatibility field added after TELEM-7/8/9 consumed 56-66.
  optional double encoder_p75_peer_fps = 67;       // p75 peer FPS driving encoder decisions

  // Adaptive decode-budget controller state (#987). Surfaces the receiver-side
  // tile-cap decision so population-scale dashboards can see the adaptive loop's
  // reasoning server-side instead of only in client console logs. Absent when
  // the controller has not produced a snapshot yet (no peers / pre-warmup).
  optional DecodeBudget decode_budget = 68;

  // Non-heap / total-process memory telemetry (#1032). `memory_used_bytes`
  // (field 12) is JS-heap only and stays single-digit MB during the freezes we
  // care about; the multi-GB pressure lives OUTSIDE the JS heap (WASM linear
  // memory, decoded VideoFrame GPU buffers, canvas/GPU textures).
  //
  // WASM linear-memory size in bytes — WebAssembly.Memory.buffer.byteLength.
  // Always available (sync, O(1)); distinct from the JS heap in field 12.
  optional uint64 wasm_memory_bytes = 69;
  // Total agent memory in bytes from performance.measureUserAgentSpecificMemory()
  // — includes GPU-backed and worker allocations. Chrome-only and gated on
  // crossOriginIsolated; sampled in the background and absent when the API is
  // unavailable or has not yet resolved its first reading.
  optional uint64 agent_memory_bytes = 70;

  // Transport re-election outcome counters (dashboard audit Tier B #2/#4;
  // discussion #562). All cumulative since the connection manager was created,
  // re-sent every health packet (same convention as the connection-loss
  // counters in fields 54-55). The relay's metrics_server expands these into a
  // single labeled counter `videocall_client_reelection_total{result=...}` so
  // Grafana can chart re-election rate AND outcome without console logs.
  //
  // Buckets mirror the four terminal branches of
  // ConnectionManager::complete_election:
  //   * proceeded:  a (re-)election switched to a new winning connection.
  //   * aborted:    re-election ran but the winner was not meaningfully better
  //                 (hysteresis), so the existing connection was kept.
  //   * preserved:  all candidates failed but the old connection was still
  //                 fresh, so it was preserved (candidate-failure path, #539).
  //   * failed:     election failed with no usable connection
  //                 ("Election failed: No valid connections") — the on-call
  //                 signal for a participant who has dropped off the call.
  optional uint64 reelection_proceeded_total = 71;
  optional uint64 reelection_aborted_total = 72;
  optional uint64 reelection_preserved_total = 73;
  optional uint64 reelection_failed_total = 74;

  // Send-side simulcast layer counts (#1143). Today the "is simulcast actually
  // engaging?" question is answerable only from console logs; these surface the
  // publisher's live layer state so a dashboard can alert when p90==1 (inert
  // simulcast). Mirrors the SimulcastSendSnapshot the #1095 UI panel already
  // reads from the camera encoder's shared atomics. Camera/screen are folded
  // into one number per kind via media_kind on the server gauge; the camera is
  // the primary signal so these report the CAMERA encoder's state. Absent in
  // single-stream builds is fine — a value of 1 is itself the inert signal.
  //
  // effective_video_layers = the number of simulcast video layers the publisher
  // is currently configured to encode/send (the ladder depth, min(flag,
  // capability)). Stable across PR #1135/#1136's threshold retune, which changes
  // WHEN this is >1, not its meaning.
  optional uint32 effective_video_layers = 75;
  // active_video_layers = how many of those layers are CURRENTLY active
  // (encoded + sent). The AQ controller sheds the top layer(s) under congestion,
  // so this can be < effective_video_layers. The gap is the shed depth.
  optional uint32 active_video_layers = 76;
}

// Receiver-side adaptive decode-budget state (#987). Mirrors the
// AdaptiveQuality tier fields on HealthPacket: a periodic snapshot of the
// current decision the local controller has reached for how many video tiles
// to decode.
message DecodeBudget {
  uint32 effective_cap = 1;        // Current effective cap on simultaneously decoded tiles
  uint32 natural = 2;              // Natural/unconstrained tile count the layout would show
  bool pressured = 3;              // Pressured latch engaged (loop owns the cap)
  OverrideMode override_mode = 4;  // Auto vs Fixed
  // Set only when override_mode == OVERRIDE_MODE_FIXED: the user's hard tile cap.
  uint32 override_fixed_n = 5;

  // Tiles actually being decoded right now = min(effective_cap, natural)
  // (#1143). `effective_cap` is the BUDGET ceiling and `natural` is what the
  // layout WOULD show unconstrained; neither alone answers "how many videos is
  // this client actually decoding?" when the layout has fewer tiles than the
  // cap allows. This is that number — the per-client "videos showing" signal the
  // observability issue asks for.
  uint32 active_set = 6;

  // Manual override mode for the controller.
  enum OverrideMode {
    OVERRIDE_MODE_UNSPECIFIED = 0; // Treated as Auto by readers
    OVERRIDE_MODE_AUTO = 1;        // Adaptive loop decides the cap
    OVERRIDE_MODE_FIXED = 2;       // User hard-pinned the cap (see override_fixed_n)
  }
}

message TierTransition {
  string direction = 1;    // "up" or "down"
  string stream = 2;       // "video", "audio", "screen"
  string from_tier = 3;    // tier label e.g. "hd_1080p", "medium_480p"
  string to_tier = 4;      // tier label
  string trigger = 5;      // "fps", "bitrate", "congestion", "coordination"
}

message TierDwell {
  string tier = 1;       // Tier label (e.g. "hd_1080p")
  double dwell_ms = 2;   // Time spent in this tier before transitioning
}
