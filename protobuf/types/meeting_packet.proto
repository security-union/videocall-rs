syntax = "proto3";

// Meeting lifecycle messages sent between server and clients
message MeetingPacket {
  enum MeetingEventType {
    MEETING_EVENT_TYPE_UNKNOWN = 0;
    // Meeting started - sent to participants when they join
    MEETING_STARTED = 1;
    // Meeting ended - sent when host leaves or last participant leaves
    MEETING_ENDED = 2;
    // Participant joined the meeting
    PARTICIPANT_JOINED = 3;
    // Participant left the meeting
    PARTICIPANT_LEFT = 4;
    // Host joined, meeting now active
    MEETING_ACTIVATED = 5;
    // Admitted from waiting room
    PARTICIPANT_ADMITTED = 6;
    // Rejected from waiting room
    PARTICIPANT_REJECTED = 7;
    // Waiting room list changed
    WAITING_ROOM_UPDATED = 8;
  }

  MeetingEventType event_type = 1;
  string room_id = 2;
  uint64 start_time_ms = 3;
  string message = 4;
  string creator_id = 5;
  int64 participant_count = 6;
  // For ADMITTED/REJECTED: affected user's ID
  string target_user_id = 7;
  // For ADMITTED: JWT to upgrade connection
  string room_token = 8;
  uint64 session_id = 9;
}

