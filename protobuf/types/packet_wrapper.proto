syntax = "proto3";

message PacketWrapper {
  enum PacketType {
    PACKET_TYPE_UNKNOWN = 0;
    RSA_PUB_KEY = 1;
    AES_KEY = 2;
    MEDIA = 3;
    CONNECTION = 4;
    DIAGNOSTICS = 5;
    HEALTH = 6;
    MEETING = 7;
    SESSION_ASSIGNED = 8;
    CONGESTION = 9;
    PEER_EVENT = 10;
    // Client -> relay ONLY control packet. Carries the set of session_ids
    // the sender is currently rendering (its viewport / "desired streams"
    // set). The relay consumes this to filter VIDEO it forwards downstream
    // (see ViewportPacket). It is never re-broadcast to other peers.
    VIEWPORT = 11;
    // Client -> relay ONLY control packet (#989, Phase 1b). Carries the
    // per-sender simulcast layer each receiver wants the relay to forward
    // (its "layer preferences"). The relay consumes this to drop simulcast
    // VIDEO layers the receiver did not select (see LayerPreferencePacket).
    // It is never re-broadcast to other peers, and — like VIEWPORT — it is
    // recorded ONLY when it arrives on the receiver's own NATS subject, so a
    // forged payload only self-degrades the forger's OWN view.
    LAYER_PREFERENCE = 12;
    // Relay -> publisher ONLY control packet (#1108, Stage 3). This is the
    // mirror image of LAYER_PREFERENCE: where LAYER_PREFERENCE flows UP from a
    // receiver to constrain what the relay FORWARDS, LAYER_HINT flows DOWN from
    // the relay to a single publisher to hint what it should bother ENCODING.
    // The relay computes, per source, the UNION (max) of every receiver's
    // requested layer for that source and, when NO receiver wants a given upper
    // layer, hints the publisher to stop producing it (publish-side
    // suppression). See LayerHintPacket.
    //
    // TRUST BOUNDARY (security-critical, inverse of LAYER_PREFERENCE): this
    // packet is RELAY-AUTHORED and travels relay -> publisher ONLY. It is
    // delivered on the publisher's OWN per-session NATS subject
    // (room.{room}.{publisher_session}) exactly like the server-authored
    // CONGESTION self-packet. The relay NEVER accepts a LAYER_HINT from a
    // client: there is no inbound LAYER_HINT ingest path, no
    // try_intercept_layer_hint, and no handler that records or acts on a
    // LAYER_HINT arriving on a session subject. A client that forges one only
    // sends bytes the relay drops on the floor. The hint is purely ADVISORY —
    // the publisher clamps it against its own real ladder and a missing/garbage
    // hint simply means "encode the full ladder" (fail-open).
    LAYER_HINT = 13;
    // Relay -> receiver ONLY control packet (#1219 Half 2). Signals a receiver
    // that its downlink is congested (the relay's bounded per-session outbound
    // channel to this receiver is overflowing on a slow socket, as observed by
    // the windowed CongestionTracker via on_outbound_drop). The receiver should
    // reduce its layer preferences to adapt to available bandwidth. Delivered on the
    // receiver's OWN per-session subject, like CONGESTION and LAYER_HINT.
    // Unlike CONGESTION (which was sender-directed), this is RECEIVER-directed:
    // the slow receiver itself must step down. See DownlinkCongestionPacket.
    DOWNLINK_CONGESTION = 14;
    // Client -> relay -> all-peers ephemeral reaction broadcast (#1884).
    // 15 and 16 are informally reserved by the unmerged PR #1843
    // (sfu-capacity `reserved 15, 16`); REACTION takes 17 to avoid a future
    // collision. See ReactionPacket. Unlike VIEWPORT/LAYER_PREFERENCE this is
    // RE-BROADCAST (media fan-out), CLEARTEXT (relay validates the enum), and
    // self-skipped for the sender (client renders a local echo).
    REACTION = 17;
  }

  // Cleartext media-kind discriminator on the OUTER envelope.
  //
  // Under E2EE_ENABLED=true the inner MediaPacket (including its own
  // `media_type`) is AES-sealed, so the relay — which never decrypts —
  // cannot tell VIDEO from AUDIO/SCREEN. This field lets the publisher
  // advertise the media kind in cleartext so the relay can apply
  // viewport-aware VIDEO filtering while ALWAYS forwarding AUDIO.
  //
  // Set only by the publishing client on MEDIA packets. Other packet
  // types leave it unspecified. The default (UNSPECIFIED = 0) MUST be
  // treated as fail-open (forward) by the relay so that older clients,
  // non-media packets, and any future packet type keep working unchanged.
  enum MediaKind {
    MEDIA_KIND_UNSPECIFIED = 0;
    VIDEO = 1;
    AUDIO = 2;
    SCREEN = 3;
  }

  PacketType packet_type = 1;
  bytes user_id = 2;
  bytes data = 3;
  uint64 session_id = 4;
  // Simulcast layer id (#989/PR #993); see discussion #890.
  uint32 simulcast_layer_id = 5;
  // Cleartext discriminator; see MediaKind. Default 0 = unspecified = fail-open.
  MediaKind media_kind = 6;
}
