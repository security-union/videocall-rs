syntax = "proto3";

message PacketWrapper {
  enum PacketType {
    PACKET_TYPE_UNKNOWN = 0;
    RSA_PUB_KEY = 1;
    AES_KEY = 2;
    MEDIA = 3;
    CONNECTION = 4;
    DIAGNOSTICS = 5;
    HEALTH = 6;
    MEETING = 7;
    SESSION_ASSIGNED = 8;
    CONGESTION = 9;
  }
  
  PacketType packet_type = 1;
  // DEPRECATED: never carries a user email. Retained only as the
  // SYSTEM_USER_ID sentinel on server-authored control packets; peer identity
  // comes from session_id + the PARTICIPANT_JOINED roster.
  bytes user_id = 2 [deprecated = true];
  bytes data = 3;
  uint64 session_id = 4;
}
